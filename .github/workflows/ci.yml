name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Check frontend formatting
        run: make frontend-format-check

      - name: Lint frontend
        run: make frontend-lint

      - name: Test frontend
        run: make frontend-test

      - name: Build frontend
        run: make frontend-build

  backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Check backend formatting
        run: make backend-format-check

      - name: Lint backend
        run: make backend-lint

      - name: Test backend
        run: make backend-test

  backend-integration:
    name: Backend Integration
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend integration suite
        run: make backend-integration-test

      - name: Show integration service logs on failure
        if: failure()
        run: ./scripts/dev-compose.sh logs --no-color postgres gcs

      - name: Tear down integration services
        if: always()
        run: ./scripts/dev-compose.sh down --remove-orphans
