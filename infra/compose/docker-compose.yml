services:
  backend:
    build:
      context: ../../backend
    working_dir: /app
    volumes:
      - ../../backend:/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      STORYTELLER_ENVIRONMENT: development
    ports:
      - "8565:8565"
    command: python -m app
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import sys, urllib.request
          urllib.request.urlopen("http://127.0.0.1:8565/health")
          sys.exit(0)
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  frontend:
    build:
      context: ../../frontend
    depends_on:
      backend:
        condition: service_healthy
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_DEV_PROXY_TARGET: http://backend:8565
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    ports:
      - "8566:8566"
    command: npm run dev -- --host 0.0.0.0 --port 8566
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          require("http").get("http://127.0.0.1:8566", (response) => {
            process.exit(response.statusCode === 200 ? 0 : 1);
          }).on("error", () => process.exit(1));
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  browser:
    build:
      context: ../../tools/webapp-qa
    depends_on:
      frontend:
        condition: service_healthy
    working_dir: /workspace/tools/webapp-qa
    environment:
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      TARGET_BASE_URL: http://frontend:8566
    volumes:
      - ../../:/workspace
      - webapp_qa_node_modules:/workspace/tools/webapp-qa/node_modules
    command: sleep infinity

volumes:
  webapp_qa_node_modules:
