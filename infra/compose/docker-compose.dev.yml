services:
  backend:
    build:
      context: ../../backend
      target: development
    working_dir: /app
    volumes:
      - ../../backend:/app
      - ../../:/workspace:ro
    environment:
      STORYTELLER_SECRETS_FILE: /workspace/secrets.yaml
      STORYTELLER_ENVIRONMENT: development
      STORYTELLER_RELOAD: "true"

  worker:
    build:
      context: ../../backend
      target: development
    working_dir: /app
    volumes:
      - ../../backend:/app
      - ../../:/workspace:ro
    environment:
      STORYTELLER_ENVIRONMENT: development

  frontend:
    build:
      context: ../../frontend
      target: development
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_DEV_PROXY_TARGET: http://backend:8565
      VITE_SESSION_EVENTS_WS_URL: /api/v1/sessions/events/ws
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules

  browser:
    build:
      context: ../../tools/webapp-qa
    depends_on:
      frontend:
        condition: service_healthy
    working_dir: /workspace/tools/webapp-qa
    environment:
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      TARGET_BASE_URL: http://frontend
    volumes:
      - ../../:/workspace
      - webapp_qa_node_modules:/workspace/tools/webapp-qa/node_modules
    command: sleep infinity

volumes:
  frontend_node_modules:
  webapp_qa_node_modules:
