input:
  run_name: Storyteller Prompt Pack
  prompt_pack_file_name: prompts
  system_prompt: "## YoloPilot Execution Context\n\nYou are being run by `yolopilot`
    in an unsupervised batch workflow against a live repository.\nThere is no interactive
    human available during this run. Do not pause to ask for confirmation unless a
    hard external blocker makes progress impossible.\nMake reasonable assumptions,
    execute decisively, and document those assumptions in your final summary.\n\n\
    ## Primary Objective\n\nComplete the task end to end with production-quality changes.\n\
    Prefer finishing the job over leaving partial implementation, TODOs, or unexplained
    follow-up work.\n\n## Git And Branching Rules\n\nStay on the current git branch
    at all times.\nNever create, rename, switch to, or request a new branch.\nCommit
    periodically to the current branch as meaningful checkpoints during development.\n\
    Before finishing, make sure the working tree is left in a coherent state for a
    final automation commit.\n\n## Working Style\n\nWork autonomously.\nInspect the
    codebase before making architectural changes.\nPreserve existing patterns unless
    there is a strong reason to improve them.\nIf you discover a better approach after
    starting, take it, but explain the wrong turn and why you changed course in the
    summary.\nAvoid destructive git operations unless they are unquestionably necessary
    and safe for the current branch.\n\n## Verification Requirements\n\nYou must verify
    your work as thoroughly as the repository allows.\n\nFunctional verification:\n\
    - Run targeted tests for the touched areas.\n- Add or expand automated tests when
    coverage is missing.\n- If practical, run broader suites after targeted validation
    passes.\n- Run linters, type checks, build steps, and formatters that are relevant
    to the touched code.\n\nUI and visual verification:\n- If the change affects UI,
    styling, rendering, layout, accessibility, or visual behavior, capture browser-based
    verification.\n- Prefer automated browser checks, screenshots, or snapshot-style
    evidence over purely code-level confidence.\n- Mention what you visually verified
    and any limits of the visual coverage in the summary.\n\nLLM and prompt verification:\n\
    - If you modify prompts, evals, model wiring, agent behavior, or any LLM-facing
    logic, create a comprehensive evaluation suite as part of the work.\n- The evaluation
    suite should cover happy paths, edge cases, regressions, safety concerns, formatting
    expectations, and failure modes relevant to the change.\n- In the final summary,
    report the evaluation criteria by name and include the measured values or pass/fail
    outcomes for each criterion.\n\n## Dependency Rules\n\nIf Python dependencies
    are needed, update `requirements.txt` and install what you need in the active
    conda environment.\nIf JavaScript dependencies are needed, use the local repository
    package manager files and keep lockfiles consistent.\nKeep dependency additions
    minimal and justified.\n\n## Delivery Requirements\n\nLeave the repository in
    a usable, well-explained state.\nYour final action must be to write the required
    markdown summary file for this task.\nThe summary must be detailed, candid, and
    useful to a reviewer who did not watch the run happen.\n"
  base_prompt: "# Base Prompt — Build the Bedtime Story + Audio App\n\nYou are building
    a production-minded local-first application that helps a user create a bedtime
    story from idea to finished text and finished narration audio.\n\nThis prompt
    pack is designed to be used **sequentially**. Read this file first, then work
    through the numbered prompts in order. Each numbered prompt should be treated
    as an incremental implementation task inside the same repository. Preserve prior
    work unless the new prompt explicitly asks you to refactor it.\n\n## Product Summary\n\
    \nThe product is a guided story-creation studio with a persistent session model.
    A user should be able to:\n\n1. See past story sessions first, including both
    in-progress and completed work.\n2. Open a session to resume, edit, or finalize
    it.\n3. Use a **two-pane workspace**:\n   - **Left pane:** chat window, about
    one-third of the desktop width.\n   - **Main pane:** structured workflow UI, about
    two-thirds of the desktop width.\n4. Control the product in **both directions**:\n\
    \   - The user can type in chat, and the system can translate those messages into
    UI actions.\n   - The user can act directly in the UI, and those actions should
    be reflected in the chat log and in durable session state.\n5. Move through a
    staged workflow:\n   - Genre selection\n   - Tone selection\n   - Story setup
    / free-form brief\n   - Story pitches\n   - Character sheet\n   - Save-the-Cat
    beat sheet\n   - Story setup preferences such as word count, runtime, and chapters\n\
    \   - Composition\n   - Audio configuration and audio generation\n   - Finalize
    / read / listen / download\n6. Download the final story as a **Word document**
    and the final narration as an audio file.\n7. Read or listen inside the product
    UI after generation is complete.\n\n## Story-Generation Philosophy\n\nThe app
    is for **bedtime stories**, not generic fiction generation. That means:\n\n- Wonder
    is welcome.\n- Adventure is welcome.\n- Mystery is welcome.\n- Tension is allowed,
    but it should be modulated for bedtime use.\n- Emotional repair matters.\n- The
    ending should feel safe, satisfying, and restful.\n- The narration and UI tone
    should remain calm, readable, and trustworthy.\n\nUse the research docs in this
    prompt pack as direct product input, especially the Save The Cat notes and the
    curated genre/tone catalog.\n\n## Required Story Workflow\n\nThe session should
    support this exact conceptual flow:\n\n1. **Genre Selection**\n   - The user selects
    from the curated genre list.\n2. **Tone Selection**\n   - The user is shown preconfigured
    tone options for the chosen genre.\n3. **Story Setup**\n   - The user provides
    a free-form description of the story they want to tell.\n4. **Story Pitches**\n\
    \   - Gemini generates multiple candidate pitches.\n   - The user can select one,
    ask for alternatives, or refine via chat.\n5. **Character Sheet**\n   - Gemini
    generates multiple candidate character sheets.\n   - The user can select or refine
    via chat.\n6. **Story Beats**\n   - Gemini generates a Save-the-Cat beat sheet
    for the selected plan.\n   - The user can refine the beats via chat or UI.\n7.
    **Story Setup Preferences**\n   - The user can set soft planning targets such
    as word count, read-aloud duration, and chapter organization.\n   - These are
    **guides**, not strict constraints.\n8. **Composition**\n   - The system writes
    in segments.\n   - The UI shows a live typewriter-like experience.\n   - Writing
    should generally appear faster than the user can comfortably read.\n   - A visible
    progress bar should show overall story progress.\n   - The agent should periodically
    post chat summaries of what it is writing.\n   - The user can interrupt and redirect
    composition, including causing rewrites of prior segments.\n9. **Audio**\n   -
    The user configures voice, music, speed, and related settings.\n   - The system
    estimates final length heuristically.\n   - Audio is generated in segments with
    visible progress.\n10. **Finalize**\n   - The user can read and listen in the
    UI.\n   - The user can download the story as a Word document and the final audio
    as a file.\n\n## Non-Negotiable Technical Requirements\n\n### Frontend\n- React\n\
    - Vite\n- TypeScript\n- The browser must **never** hold provider secrets\n- Chat
    pane on the left, main pane on the right\n- Past sessions screen must be the first
    meaningful screen\n\n### Backend\n- Python\n- FastAPI\n- Durable backend-owned
    business logic\n- Clear separation between route handlers, domain services, AI
    orchestration, and persistence\n\n### Data and Infrastructure\n- PostgreSQL is
    the durable store for structured application state\n- Use a **file-backed GCS
    emulator** for object/blob storage in local development\n- The app must run with
    Docker Compose\n- Postgres and object storage must both be **persistent across
    restarts**\n- `secrets.yaml` exists locally for API keys and must **not** be committed
    to git\n\n### AI\n- Use the **Gemini 3.1 family** for text/planning/composition
    workloads\n- Keep model IDs centralized in config, not scattered through the codebase\n\
    - Put AI calls behind backend services and adapters\n- Use structured outputs
    wherever determinism matters\n- Use separate adapters for:\n  - planning/classification/intent
    parsing\n  - long-form story generation\n  - narration / TTS\n- Keep narration
    generation isolated behind a provider-style interface because model offerings
    evolve\n\n## Recommended Architecture\n\nUse a calm, maintainable architecture
    rather than a clever one.\n\n### Suggested application shape\n- `frontend/` —
    React + Vite app\n- `backend/` — FastAPI app plus domain services\n- `infra/`
    — Docker Compose, Dockerfiles, local infrastructure helpers\n- `docs/` — architecture
    notes, ADRs, product docs\n\n### Suggested backend layers\n- `api/` or route handlers\n\
    - `settings/`\n- `db/`\n- `models/`\n- `repositories/`\n- `services/`\n- `worker/`\n\
    - `ai/`\n- `storage/`\n\n### Suggested durable concepts\n- Session\n- Workflow
    stage\n- Event log\n- Selected genre\n- Selected tone\n- Story brief\n- Pitch
    batch + selected pitch\n- Character batch + selected character sheet\n- Beat sheet\n\
    - Story setup preferences\n- Outline / chapter or scene plan\n- Continuity bible\n\
    - Composition job\n- Composition segment\n- Audio job\n- Asset record\n\n## Real-Time
    and Long-Running Work\n\nTreat composition and audio generation as **durable background
    jobs**, not request-thread work.\n\n- The browser should be able to refresh without
    losing the job.\n- The UI should receive live progress updates.\n- The backend
    should own current truth about progress.\n- A separate worker process is strongly
    preferred.\n- Use PostgreSQL-backed durable job records.\n- Persist partial outputs
    frequently enough that resume is trustworthy.\n\n## Chat and UI Bridge Rules\n\
    \nThe product must support true bidirectional interaction.\n\n### Chat-to-UI\n\
    A user message can propose actions like:\n- select a tone\n- regenerate pitches\n\
    - choose a pitch\n- adjust character traits\n- soften the midpoint\n- shorten
    the story target\n- pause writing\n- change narration speed\n\n### UI-to-Chat\n\
    A direct UI action should appear in the chat history as a compact structured summary,
    for example:\n- “Selected genre: Quest Fantasy”\n- “Updated target runtime: ~12
    minutes”\n- “Accepted revised beat sheet”\n\n### Safety rule\nThe model can **propose**
    actions, but a deterministic policy layer should decide whether they are valid
    in the current session state.\n\n## Save The Cat Expectations\n\nUse the Save
    The Cat method as the backbone of planning.\n\n- The beat sheet should be explicit,
    editable, and stored as structured data.\n- The composition stage should write
    against the beat sheet and the detailed outline derived from it.\n- Bedtime adaptation
    matters: the low points can be emotionally meaningful without becoming harsh or
    distressing.\n- The final story should still feel like a transformation story,
    not just a string of nice scenes.\n\n## Genre and Tone Expectations\n\nUse the
    included research docs to seed:\n- a curated genre list\n- per-genre tone options\n\
    - bedtime-suitable arc notes\n- tone descriptors that can guide UI copy and AI
    prompting\n\nDo **not** label tones with living or copyrighted-author names. Use
    generic tone labels and descriptors.\n\n## Audio Expectations\n\nNarration must
    be treated as a real product feature, not a side demo.\n\n- Segment audio generation
    so it is resumable\n- Estimate length heuristically before generation\n- Support
    voice selection\n- Support speed controls\n- Support optional background music\n\
    - Keep music subordinate to narration clarity\n- Produce a final compiled audio
    artifact\n- Keep intermediate and final artifacts trackable through durable metadata\n\
    \n## Export Expectations\n\nAt minimum, the user must be able to get:\n- final
    story text in the app\n- final audio in the app\n- downloadable `.docx`\n- downloadable
    final audio file\n\n## Developer Experience and Quality Bar\n\nFavor:\n- typed
    interfaces\n- boring, explicit service boundaries\n- migrations\n- tests around
    durable state\n- visible logs\n- simple scripts for local dev\n- useful docs\n\
    \nAvoid:\n- stuffing everything into route handlers\n- leaking secrets to the
    browser\n- relying on browser local state as the source of truth\n- making stage
    transitions implicit or magical\n- hiding important state in giant untyped JSON
    blobs when relational structure is obvious\n\n## How to Respond to Each Numbered
    Prompt\n\nFor each numbered prompt in this pack:\n\n1. Treat it as the next incremental
    repo task.\n2. Preserve prior work unless the new prompt requires refactor.\n\
    3. Make reasonable local decisions when the prompt leaves room, but stay aligned
    with this base prompt.\n4. Prefer small, coherent commits worth reviewing.\n5.
    After implementing, report:\n   - what you changed\n   - key files touched\n \
    \  - tests run\n   - any important follow-up risks or TODOs\n6. If a prompt depends
    on earlier work, inspect the repo and extend it rather than rebuilding from scratch.\n\
    \n## Preferred Model Split\n\nKeep exact model IDs configurable, but the intended
    split is:\n\n- **High-value reasoning / plan synthesis / long-form composition:**
    Gemini 3.1 Pro class model\n- **Fast structured tasks / intent parsing / normalization
    / small transforms:** Gemini 3.1 Flash-Lite class model\n- **Narration:** Gemini
    TTS adapter, configured independently from text models\n\nIf provider offerings
    change, keep the application code stable and swap configuration or adapter internals.\n\
    \n## Final Reminder\n\nBuild this as a durable, session-based, full-stack application
    — not a single-shot prompt demo.\n\nThe finished experience should feel like a
    guided story studio where a user can:\n- start from an idea,\n- shape it collaboratively,\n\
    - watch it be written,\n- redirect it while it is being written,\n- turn it into
    audio,\n- and come back later to continue or enjoy the finished result."
  tasks:
    - filename: 00-project-charter.md
      content: "# 00 — Project Charter and Success Criteria\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nCreate the initial
        project framing for a full-stack app that helps a user build a bedtime story,
        turn it into audio, and resume past sessions.\n\n## Build\n- Write a top-level
        README that explains the product vision, the end-to-end story workflow, the
        required stages, and the major technical choices already fixed by the brief.\n\
        - Document the non-negotiable requirements: React + Vite frontend, Python
        FastAPI backend, PostgreSQL for all structured data, a file-backed GCS emulator
        for blobs, Docker Compose for local orchestration, and `secrets.yaml` kept
        out of git.\n- Add a short architecture note describing why all Gemini calls
        must happen on the backend and why long-running composition and audio jobs
        need resumable server-side state.\n\n## Deliverables\n\n- `README.md` with
        product overview and local development expectations\n- `docs/product-brief.md`
        or equivalent design note\n- `docs/architecture-overview.md` with the first
        cut of the system picture\n\n## Acceptance checks\n\n- A new engineer can
        read the repo root and understand what is being built.\n- The required story
        stages from the brief are explicitly listed in order.\n- The first screen
        requirement — a past-sessions screen for resume/edit/create — is called out
        early, not buried.\n\n## Notes\n\nDo not generate implementation code yet
        beyond lightweight documentation scaffolding.\n\n## Suggested commit label\n\
        \n`feat(prompt-00): project charter`\n"
    - filename: 01-monorepo-skeleton.md
      content: "# 01 — Monorepo Skeleton and Folder Layout\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nCreate a clean
        repository layout that can hold the web app, API, worker logic, infrastructure
        files, and documentation without mixing concerns.\n\n## Build\n- Create top-level
        folders for the frontend, backend, infrastructure, docs, scripts, and test
        assets.\n- Choose a simple naming convention that keeps the repo approachable,
        for example `frontend/`, `backend/`, `infra/`, and `docs/`.\n- Add placeholder
        READMEs in major folders so the purpose of each directory is obvious.\n\n\
        ## Deliverables\n\n- Repository folder structure committed\n- Per-folder README
        placeholders\n- A brief tree snapshot added to the root README\n\n## Acceptance
        checks\n\n- The web app and API live in clearly separated directories.\n-
        There is an obvious home for Docker Compose, database migrations, and persistent
        data notes.\n- The structure leaves room for a backend worker process even
        if it is not implemented yet.\n\n## Notes\n\nKeep the layout conventional.
        Avoid clever nesting that makes the repo harder to navigate.\n\n## Suggested
        commit label\n\n`feat(prompt-01): monorepo skeleton`\n"
    - filename: 02-vite-react-scaffold.md
      content: "# 02 — Scaffold the React Frontend with Vite\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nInitialize the
        frontend as a React + Vite + TypeScript application with a small, reliable
        developer setup.\n\n## Build\n- Bootstrap the web app using the current stable
        Vite React TypeScript template.\n- Set up a minimal component structure, route
        shell, app entry point, and dev scripts.\n- Add linting and formatting for
        the frontend and make sure the generated scaffold is cleaned up so there is
        no demo counter code left behind.\n\n## Deliverables\n\n- `frontend/` Vite
        app\n- Frontend package scripts for dev, build, lint, and preview\n- A simple
        placeholder route that proves the scaffold runs\n\n## Acceptance checks\n\n\
        - The frontend can start in isolation with the normal Vite dev command.\n\
        - The landing shell is branded for the project rather than the Vite demo.\n\
        - TypeScript strictness is enabled or moving in that direction.\n\n## Notes\n\
        \nDo not wire real product flows yet. Focus on a clean foundation.\n\n## Suggested
        commit label\n\n`feat(prompt-02): vite react scaffold`\n"
    - filename: 03-fastapi-scaffold.md
      content: "# 03 — Scaffold the FastAPI Backend\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nInitialize the backend
        as a FastAPI service with clear application startup, health routes, configuration
        loading, and room for future modules.\n\n## Build\n- Create the FastAPI app
        package, a health endpoint, and a versioned API router structure.\n- Add a
        backend dependency file or `pyproject.toml` and a local run command.\n- Split
        the code into sensible modules such as settings, api routes, db, services,
        and domain models.\n\n## Deliverables\n\n- `backend/` FastAPI project\n- A
        `/health` endpoint\n- Basic backend run instructions in the backend README\n\
        \n## Acceptance checks\n\n- The API can start locally and return a successful
        health response.\n- The code layout makes it obvious where future domain services
        should go.\n- The scaffold does not hide everything in one giant file.\n\n\
        ## Notes\n\nPrefer boring, maintainable FastAPI structure over magic.\n\n\
        ## Suggested commit label\n\n`feat(prompt-03): fastapi scaffold`\n"
    - filename: 04-docker-compose-foundation.md
      content: "# 04 — Docker Compose Foundation\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nCreate a first working
        `docker-compose.yml` that can orchestrate the web app, API, PostgreSQL, and
        a file-backed GCS emulator for local development.\n\n## Build\n- Add services
        for `frontend`, `backend`, `postgres`, and `gcs` with sensible container names
        and ports.\n- Use named volumes for PostgreSQL data and for the GCS emulator’s
        mounted storage directory so data persists across restarts.\n- Make sure the
        GCS emulator can run in an easy local mode and is addressable from the backend
        through environment variables.\n\n## Deliverables\n\n- `docker-compose.yml`\n\
        - Per-service Dockerfiles or a clear placeholder plan if a service Dockerfile
        comes in the next prompt\n- A README section describing how to bring the stack
        up and tear it down safely\n\n## Acceptance checks\n\n- The compose file includes
        persistence for both database data and object storage data.\n- Container networking
        and ports are explicit and developer friendly.\n- A fresh clone can be brought
        up without hand-editing the compose file.\n\n## Notes\n\nFavor clear named
        volumes and explicit env wiring. Keep secrets out of the compose file.\n\n\
        ## Suggested commit label\n\n`feat(prompt-04): docker compose foundation`\n"
    - filename: 05-backend-settings-and-secrets-loading.md
      content: "# 05 — Backend Settings, Env Loading, and `secrets.yaml` Support\n\
        \nRead `base_prompt.md` first and preserve all prior prompt work.\n\n## Objective\n\
        \nImplement a backend configuration system that can load required settings
        from environment variables and a local `secrets.yaml` file that never belongs
        in git.\n\n## Build\n- Add a typed settings module that can read normal environment
        variables and, for local development, merge values from `secrets.yaml`.\n\
        - Define settings for database connection, Gemini API key, GCS emulator endpoint,
        bucket names, CORS origins, and feature flags.\n- Fail fast with useful validation
        errors when required configuration is missing.\n\n## Deliverables\n\n- Typed
        backend settings module\n- `secrets.example.yaml` or equivalent schema document\n\
        - Documentation for how `secrets.yaml` is discovered and merged\n\n## Acceptance
        checks\n\n- A developer can run the project locally by creating `secrets.yaml`
        from the example file.\n- The API never requires the browser to know the Gemini
        API key.\n- Missing config values produce readable startup errors, not stack
        traces full of noise.\n\n## Notes\n\nKeep the precedence rules simple and
        documented.\n\n## Suggested commit label\n\n`feat(prompt-05): backend settings
        and secrets loading`\n"
    - filename: 06-gitignore-and-secrets-hygiene.md
      content: "# 06 — Git Ignore Rules and Secrets Hygiene\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nMake accidental
        secret leaks and transient file clutter difficult by default.\n\n## Build\n\
        - Update `.gitignore` so `secrets.yaml`, local env files, build artifacts,
        caches, and persistent dev data directories are excluded.\n- Add a short security
        note that explains why `secrets.yaml` must never be committed and where safe
        sample files belong instead.\n- Optionally add a simple pre-commit or grep-based
        guard for obviously sensitive file names and values.\n\n## Deliverables\n\n\
        - Hardened `.gitignore`\n- `docs/secrets-and-local-config.md`\n- Any lightweight
        guard rails you add for secret hygiene\n\n## Acceptance checks\n\n- The repository
        clearly distinguishes example config from real config.\n- Persistent local
        data can exist without polluting git status.\n- A contributor would have to
        work hard to accidentally commit `secrets.yaml`.\n\n## Notes\n\nDo not add
        heavyweight secret scanners unless they remain easy for contributors to work
        with.\n\n## Suggested commit label\n\n`feat(prompt-06): gitignore and secrets
        hygiene`\n"
    - filename: 07-developer-bootstrap-scripts.md
      content: "# 07 — Developer Bootstrap Scripts and Convenience Commands\n\nRead
        `base_prompt.md` first and preserve all prior prompt work.\n\n## Objective\n\
        \nCreate a predictable local workflow so the project is easy to start, stop,
        reset, lint, and test.\n\n## Build\n- Add a `Makefile`, task runner, or script
        collection that wraps the most common repo commands.\n- Include commands for
        starting the stack, stopping it, viewing logs, resetting local volumes when
        necessary, and running lint/tests.\n- Document the intended daily workflow
        for a developer making changes to either frontend or backend.\n\n## Deliverables\n\
        \n- Top-level developer task script(s)\n- README quickstart commands\n- A
        reset strategy for local persistent data\n\n## Acceptance checks\n\n- The
        most common dev workflows can be run without memorizing long Docker commands.\n\
        - There is a safe way to reset the local stack when migrations or seed data
        change.\n- The commands are cross-platform enough for normal team use or clearly
        documented if they are shell-specific.\n\n## Notes\n\nKeep the command surface
        small and obvious.\n\n## Suggested commit label\n\n`feat(prompt-07): developer
        bootstrap scripts`\n"
    - filename: 08-repo-quality-tooling.md
      content: "# 08 — Quality Tooling and Shared Conventions\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nEstablish basic
        linting, formatting, and code-style conventions across both the frontend and
        backend before product code grows.\n\n## Build\n- Configure frontend linting
        and formatting, plus backend formatting and linting, with commands that can
        run in CI later.\n- Add editor settings such as `.editorconfig` if they help
        keep whitespace and line endings stable.\n- Write a short style note that
        covers naming, API shape conventions, error handling style, and how generated
        assets should be separated from hand-written source.\n\n## Deliverables\n\n\
        - Formatting and lint commands for both stacks\n- Any shared editor config
        files\n- `docs/contributing.md` with practical conventions\n\n## Acceptance
        checks\n\n- A clean checkout can run the quality commands without custom local
        hacks.\n- The repo has one obvious formatter per language instead of dueling
        tools.\n- The conventions are short, actionable, and tied to this project.\n\
        \n## Notes\n\nAvoid style bikeshedding. Choose defaults and move on.\n\n##
        Suggested commit label\n\n`feat(prompt-08): repo quality tooling`\n"
    - filename: 09-initial-system-diagram-and-adr.md
      content: "# 09 — Initial System Diagram and First Architecture Decisions\n\n\
        Read `base_prompt.md` first and preserve all prior prompt work.\n\n## Objective\n\
        \nCapture the core architecture decisions early so later prompts can build
        on a stable mental model.\n\n## Build\n- Write an ADR or equivalent note for
        the main architectural choices: backend-owned AI calls, Postgres-backed durable
        state, file-backed GCS emulator for assets, WebSocket-based live updates,
        and a separate worker process for long-running jobs.\n- Add one lightweight
        system diagram in Markdown or Mermaid showing browser, API, worker, database,
        object storage, and Gemini integrations.\n- Record the decision that word
        count, runtime, and chapter count are soft planning hints rather than hard
        constraints.\n\n## Deliverables\n\n- `docs/adr/` or similar notes\n- A simple
        system diagram\n- A written statement of the product’s soft-constraint philosophy\n\
        \n## Acceptance checks\n\n- Later contributors can tell where real-time updates
        and long-running tasks belong.\n- The diagram includes session resume and
        durable event history as first-class concepts.\n- The architecture notes reflect
        the actual product brief instead of a generic app template.\n\n## Notes\n\n\
        Use plain language. This doc is for builders, not for impressing anyone.\n\
        \n## Suggested commit label\n\n`feat(prompt-09): initial system diagram and
        adr`\n"
    - filename: 10-domain-model-and-state-machine.md
      content: "# 10 — Define the Domain Model and Session State Machine\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nModel the core
        business entities and the allowed stage transitions for a story creation session
        so the backend and frontend can agree on workflow rules.\n\n## Build\n- Define
        the major entities: story session, workflow stage, genre, tone profile, story
        brief, pitch, selected pitch, character sheet, beat sheet, story setup, composition
        segment, audio job, export asset, and event log entry.\n- Describe the allowed
        stage order while still allowing safe backward edits and re-entry from past
        sessions.\n- Write down the rules for what counts as `draft`, `in_progress`,
        `completed`, and `needs_regeneration` state.\n\n## Deliverables\n\n- `docs/domain-model.md`\n\
        - State machine diagram or table\n- Shared enum or constants plan for workflow
        stages\n\n## Acceptance checks\n\n- The model supports resuming an unfinished
        session without guessing from UI state.\n- Backward edits are supported intentionally
        rather than as an accident.\n- The stage machine makes room for interruption
        and rewrite during composition.\n\n## Notes\n\nTreat the session as the durable
        unit of work.\n\n## Suggested commit label\n\n`feat(prompt-10): domain model
        and state machine`\n"
    - filename: 11-postgres-schema-and-migrations.md
      content: "# 11 — PostgreSQL Schema and Database Migrations\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nImplement the
        first real PostgreSQL schema for the durable objects identified in the domain
        model.\n\n## Build\n- Set up SQLAlchemy/SQLModel-style models and Alembic
        migrations or an equivalent migration system.\n- Create tables for sessions,
        genres, tone profiles, pitches, character sheets, beat sheets, story setup,
        job records, export assets, and event logs.\n- Add timestamps, status fields,
        and foreign keys that reflect how the UI will resume and audit work.\n\n##
        Deliverables\n\n- Initial database models\n- Migration files\n- Local migration
        commands documented\n\n## Acceptance checks\n\n- A fresh database can be migrated
        from zero to head reliably.\n- The schema can represent an in-progress or
        completed story session without storing everything in one JSON blob.\n- Primary
        relationships and indexes are present for obvious query paths.\n\n## Notes\n\
        \nIt is fine to keep some flexible JSON columns for model outputs, but do
        not avoid a real relational core.\n\n## Suggested commit label\n\n`feat(prompt-11):
        postgres schema and migrations`\n"
    - filename: 12-seed-genres-and-tones.md
      content: "# 12 — Seed the Genre and Tone Catalog\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nCreate a durable, queryable
        catalog of genres and preconfigured tone choices based on the research docs
        in this prompt pack.\n\n## Build\n- Load the approved genre list and its tone
        choices into the database through a seed script or migration-based seed step.\n\
        - Store short descriptions, UI labels, bedtime-safety notes, and any default
        planning hints for each tone.\n- Add a way to re-run the seed safely without
        duplicating rows.\n\n## Deliverables\n\n- Genre and tone seed data\n- A repeatable
        seed command\n- Docs that point back to the research files in this pack\n\n\
        ## Acceptance checks\n\n- The app can populate the genre and tone selectors
        entirely from the database or a backend-owned source of truth.\n- Tone choices
        are filtered by genre without frontend hard-coding.\n- The seed step is idempotent.\n\
        \n## Notes\n\nKeep the seed format friendly to later editing by humans.\n\n\
        ## Suggested commit label\n\n`feat(prompt-12): seed genres and tones`\n"
    - filename: 13-storage-abstraction-and-buckets.md
      content: "# 13 — Storage Abstraction and Bucket Strategy\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nAdd a backend
        storage layer that can write and read blobs through a single abstraction while
        targeting the local GCS emulator in development.\n\n## Build\n- Create a storage
        service that knows how to create buckets if needed, upload objects, fetch
        object metadata, and generate predictable object paths.\n- Define bucket or
        prefix conventions for partial drafts, audio segments, final audio, exports,
        and debugging artifacts.\n- Wire the backend to the local emulator host from
        configuration instead of assuming production GCS.\n\n## Deliverables\n\n-
        Backend storage abstraction module\n- Bucket/prefix naming document\n- A smoke
        test or CLI script that writes and reads a sample object\n\n## Acceptance
        checks\n\n- Blob operations work against the local emulator without code changes
        in business logic.\n- Object paths are stable enough to support resumable
        jobs and later cleanup policies.\n- There is one place to swap storage backends
        later if needed.\n\n## Notes\n\nDesign paths around session IDs and artifact
        types.\n\n## Suggested commit label\n\n`feat(prompt-13): storage abstraction
        and buckets`\n"
    - filename: 14-repositories-and-session-service.md
      content: "# 14 — Repository Layer and Session Service\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nBuild the first
        real backend service layer around story sessions so the app stops thinking
        in terms of raw tables.\n\n## Build\n- Add repository or data-access helpers
        for the most important session queries and updates.\n- Implement a session
        service that can create a new session, load a session snapshot, update stage
        state, and list recent sessions.\n- Make sure the service returns data shaped
        for the UI instead of leaking ORM internals.\n\n## Deliverables\n\n- Session
        repositories or DAOs\n- Session service layer\n- Backend tests for session
        creation and retrieval\n\n## Acceptance checks\n\n- The backend has a clean
        path for the future past-sessions home screen.\n- Business rules about stage
        transitions live in the service layer, not in route handlers.\n- Tests prove
        the service can round-trip real database state.\n\n## Notes\n\nFavor explicit
        service methods over a generic catch-all CRUD layer.\n\n## Suggested commit
        label\n\n`feat(prompt-14): repositories and session service`\n"
    - filename: 15-event-log-and-audit-trail.md
      content: "# 15 — Event Log and Audit Trail\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nCreate an append-only event
        history that can explain how a session changed over time and later power resume,
        replay, and debugging.\n\n## Build\n- Define an event log table or model that
        captures actor, event type, payload, timestamps, and optional stage context.\n\
        - Record meaningful events for session creation, selections, AI outputs, user
        edits, chat messages, UI actions, composition progress, and audio progress.\n\
        - Add helper utilities for appending events in a consistent way.\n\n## Deliverables\n\
        \n- Event log model and access layer\n- Common event helpers\n- Documentation
        for the event taxonomy\n\n## Acceptance checks\n\n- A session’s history can
        be reconstructed without relying on browser local storage.\n- Events distinguish
        between user actions, agent actions, and system/worker actions.\n- Event payloads
        are typed or at least versioned enough to age well.\n\n## Notes\n\nThink of
        this as product telemetry plus durable replay support.\n\n## Suggested commit
        label\n\n`feat(prompt-15): event log and audit trail`\n"
    - filename: 16-asset-metadata-and-file-records.md
      content: "# 16 — Asset Metadata and File Records\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nTrack generated files
        as first-class records so exports and audio are discoverable, resumable, and
        downloadable later.\n\n## Build\n- Create an asset table for things like draft
        text snapshots, composition segments, audio segments, final mixed audio, and
        docx exports.\n- Store object path, media type, size, checksum if practical,
        generation status, and owning session.\n- Add service methods for saving new
        asset records and marking them ready or failed.\n\n## Deliverables\n\n- Asset
        metadata model\n- Asset service helpers\n- Tests for creating and querying
        asset records\n\n## Acceptance checks\n\n- The backend can answer ‘what downloadable
        artifacts exist for this session?’ without scanning storage blindly.\n- Failed
        or partial asset generation is visible in durable state.\n- The schema is
        compatible with segmented audio generation.\n\n## Notes\n\nKeep file metadata
        separate from the blob bytes themselves.\n\n## Suggested commit label\n\n\
        `feat(prompt-16): asset metadata and file records`\n"
    - filename: 17-realtime-event-schema.md
      content: "# 17 — Real-Time Event Schema and Channel Plan\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nDefine the payload
        contracts for server-to-client live updates before implementing the transport
        in detail.\n\n## Build\n- Design event shapes for chat messages, stage changes,
        UI action echoes, composition chunk streams, progress updates, job status,
        and error notifications.\n- Decide how session-scoped channels or subscriptions
        work so only the right browser tab sees the right updates.\n- Document how
        the same underlying event log relates to the ephemeral real-time feed.\n\n\
        ## Deliverables\n\n- `docs/realtime-events.md`\n- Shared event type definitions
        or JSON schemas\n- A short note on channel/auth assumptions for local development\n\
        \n## Acceptance checks\n\n- Frontend engineers know what payloads to expect
        before the sockets are built.\n- Progress events are expressive enough for
        both composition and audio workflows.\n- The schema leaves room for optimistic
        UI updates and later replay.\n\n## Notes\n\nKeep names plain and payloads
        boring.\n\n## Suggested commit label\n\n`feat(prompt-17): realtime event schema`\n"
    - filename: 18-postgres-job-runner-skeleton.md
      content: "# 18 — Postgres-Backed Job Runner Skeleton\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nCreate a worker-friendly
        job system that uses PostgreSQL as the durable queue so the app can run long
        story and audio tasks without adding another data store.\n\n## Build\n- Create
        a job table with type, status, lease/lock fields, attempt count, payload,
        result summary, and heartbeat timestamps.\n- Build a small worker loop that
        claims jobs using a safe Postgres pattern and marks progress or failure durably.\n\
        - Add a worker service entry point that can run beside the API in Docker Compose.\n\
        \n## Deliverables\n\n- Job table and service\n- Worker process scaffold\n\
        - Compose service entry for the worker\n\n## Acceptance checks\n\n- Long-running
        tasks can survive browser refreshes because work is not tied to the request
        thread.\n- The queue does not require Redis or any extra persistence system.\n\
        - The worker can be started independently from the API.\n\n## Notes\n\nKeep
        the first version simple but durable. Retries and backoff can come next.\n\
        \n## Suggested commit label\n\n`feat(prompt-18): postgres job runner skeleton`\n"
    - filename: 19-data-layer-integration-tests.md
      content: "# 19 — Data Layer Integration Tests\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nLock down the database,
        storage abstraction, and worker skeleton with a first batch of integration
        tests before product behavior gets complex.\n\n## Build\n- Add integration
        tests for migrations, session creation, event logging, asset metadata, and
        job claiming.\n- Make the tests easy to run locally, ideally against the Docker
        Compose services or disposable test containers.\n- Document how these tests
        fit into the future CI pipeline.\n\n## Deliverables\n\n- Backend integration
        test suite\n- Test fixtures for DB and storage\n- Docs for running integration
        tests\n\n## Acceptance checks\n\n- The most important durable state paths
        are covered by real tests, not only unit tests.\n- A migration regression
        would be caught quickly.\n- The worker queue claim logic has test coverage.\n\
        \n## Notes\n\nPrioritize tests for durability and resumability over edge cosmetic
        cases.\n\n## Suggested commit label\n\n`feat(prompt-19): data layer integration
        tests`\n"
    - filename: 20-frontend-app-shell-and-routing.md
      content: "# 20 — Frontend App Shell and Routing\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nSet up the React app
        shell, route structure, and global layout primitives that will hold the story
        workflow.\n\n## Build\n- Add route definitions for the home screen, session
        workspace, and a not-found fallback.\n- Create a top-level layout with room
        for future navigation, toasts, and connection status indicators.\n- Introduce
        a predictable file structure for pages, shared UI, hooks, API clients, and
        state stores.\n\n## Deliverables\n\n- App shell components\n- Route configuration\n\
        - Frontend folder structure conventions\n\n## Acceptance checks\n\n- The app
        has real routes instead of a single demo page.\n- The session workspace route
        can accept a session ID.\n- There is a clear place for future shared components
        and data hooks.\n\n## Notes\n\nDo not build the full workflow UI yet. Prepare
        the shell.\n\n## Suggested commit label\n\n`feat(prompt-20): frontend app
        shell and routing`\n"
    - filename: 21-past-sessions-home-screen.md
      content: "# 21 — Past Sessions Home Screen\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nImplement the first product-facing
        screen: a page where the user can see prior story sessions, tell whether they
        are in progress or complete, and resume or start fresh.\n\n## Build\n- Build
        a backend endpoint that lists recent sessions with key metadata like title,
        last modified time, stage, and completion status.\n- Create the home screen
        UI that renders these sessions in a useful list or card layout and includes
        a strong ‘new session’ action.\n- Support empty, loading, and error states
        so the screen feels complete.\n\n## Deliverables\n\n- Session list API endpoint\n\
        - Home screen page and components\n- Basic filtering or grouping by status
        if it fits cleanly\n\n## Acceptance checks\n\n- A user lands on the past-sessions
        screen first, not on a blank editor.\n- Both in-progress and completed sessions
        are clearly distinguishable.\n- The user can enter an existing session or
        start a new one from this screen.\n\n## Notes\n\nKeep the first version clean
        and legible rather than over-designed.\n\n## Suggested commit label\n\n`feat(prompt-21):
        past sessions home screen`\n"
    - filename: 22-workspace-two-pane-layout.md
      content: "# 22 — Workspace Two-Pane Layout\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nBuild the session workspace
        shell with a left chat pane taking roughly one-third of the screen and a main
        pane using the remaining space.\n\n## Build\n- Create the session workspace
        page with a responsive two-pane layout that honors the 1/3 chat and 2/3 main-pane
        requirement on desktop.\n- Add a compact header showing session name, current
        stage, save status, and primary actions like return to home.\n- Make the layout
        degrade gracefully on smaller screens without losing the conceptual two-pane
        model.\n\n## Deliverables\n\n- Workspace page layout\n- Stage/status header\n\
        - Responsive behavior rules\n\n## Acceptance checks\n\n- On desktop, the chat
        pane visibly occupies about one-third of the width.\n- The main pane has enough
        room for form workflows and live composition views.\n- The workspace feels
        like one product surface rather than two unrelated pages.\n\n## Notes\n\n\
        Use simple layout primitives. Fancy chrome can wait.\n\n## Suggested commit
        label\n\n`feat(prompt-22): workspace two pane layout`\n"
    - filename: 23-frontend-state-foundation.md
      content: "# 23 — Frontend State Foundation\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nIntroduce a predictable
        frontend state model for session snapshots, live events, and optimistic UI
        interactions.\n\n## Build\n- Choose and wire the frontend data tools you will
        rely on, such as React Query for server state and a small local store for
        live session state.\n- Model the current session snapshot, pending UI actions,
        and live event stream state separately so responsibilities stay clear.\n-
        Add thin API hooks for fetching the home-screen list and a single session
        snapshot.\n\n## Deliverables\n\n- Frontend data/state setup\n- Session data
        hooks\n- A short state architecture note\n\n## Acceptance checks\n\n- The
        frontend is not forced into prop-drilling for session state.\n- Server state
        and transient UI state are clearly separated.\n- The new state layer can support
        real-time updates later.\n\n## Notes\n\nKeep the state model understandable
        to someone new to the repo.\n\n## Suggested commit label\n\n`feat(prompt-23):
        frontend state foundation`\n"
    - filename: 24-design-tokens-and-accessibility-foundation.md
      content: "# 24 — Design Tokens and Accessibility Foundation\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nEstablish visual
        and accessibility primitives early so the later workflow screens remain consistent
        and usable.\n\n## Build\n- Define basic spacing, typography, color, surface,
        and radius tokens or theme values.\n- Create reusable accessible building
        blocks for buttons, text inputs, panels, badges, progress bars, and lists.\n\
        - Set keyboard focus styles, semantic heading structure, and reduced-motion
        awareness where it matters.\n\n## Deliverables\n\n- Theme/token setup\n- Reusable
        primitive components\n- Accessibility checklist note\n\n## Acceptance checks\n\
        \n- The project has a visual language before complex screens arrive.\n- Interactive
        controls are keyboard visible and reasonably accessible.\n- The design choices
        fit a calm bedtime-story product rather than a generic dashboard.\n\n## Notes\n\
        \nFavor calm, readable UI over novelty.\n\n## Suggested commit label\n\n`feat(prompt-24):
        design tokens and accessibility foundation`\n"
    - filename: 25-chat-window-foundation.md
      content: "# 25 — Chat Window Foundation\n\nRead `base_prompt.md` first and preserve
        all prior prompt work.\n\n## Objective\n\nCreate the foundational chat UI
        in the left pane so later prompts can connect it to agent behavior and UI
        control.\n\n## Build\n- Build a chat message list, a message composer, timestamps,
        and basic message role styling.\n- Support assistant, user, system, and action-echo
        message types from the start.\n- Add loading and disabled states that will
        later reflect composition or audio work.\n\n## Deliverables\n\n- Chat pane
        components\n- Message type rendering rules\n- Composer component with submit
        handling\n\n## Acceptance checks\n\n- The chat pane feels like a real conversational
        surface, not a placeholder textarea.\n- The UI can render multiple message
        roles cleanly.\n- The message list is scrollable and stable under streaming
        updates later.\n\n## Notes\n\nDo not wire AI yet beyond mock or local state
        behavior if needed.\n\n## Suggested commit label\n\n`feat(prompt-25): chat
        window foundation`\n"
    - filename: 26-main-pane-stage-scaffold.md
      content: "# 26 — Main Pane Stage Scaffold\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nCreate the main-pane scaffolding
        for the multi-stage story workflow without yet implementing every stage’s
        business logic.\n\n## Build\n- Render a stage navigator or progress indicator
        that shows the ordered workflow from genre selection through finalize.\n-
        Create placeholder stage panels for each required step so the product flow
        is visible end-to-end.\n- Support stage-aware routing or local navigation
        in a way that can coexist with durable backend stage state.\n\n## Deliverables\n\
        \n- Stage navigator UI\n- Stage placeholder views\n- Stage-to-route or stage-to-panel
        mapping\n\n## Acceptance checks\n\n- Every required stage from the brief exists
        in the UI skeleton.\n- The main pane makes it obvious which step the user
        is on.\n- The navigation pattern can later support locked, unlocked, and revisitable
        stages.\n\n## Notes\n\nKeep the first stage scaffold thin but coherent.\n\n\
        ## Suggested commit label\n\n`feat(prompt-26): main pane stage scaffold`\n"
    - filename: 27-reusable-form-and-card-components.md
      content: "# 27 — Reusable Form and Card Components\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nBuild the reusable
        UI pieces that will support tone selection cards, pitch cards, character sheets,
        and beat-sheet editors.\n\n## Build\n- Create card components, selection states,
        empty-state blocks, inline help text, and summary panels.\n- Build consistent
        form components for selects, sliders, toggles, numeric fields, text areas,
        and validation messages.\n- Add a small library of layout helpers for two-column
        forms, sticky side summaries, and split cards where useful.\n\n## Deliverables\n\
        \n- Reusable card/form component library\n- Documentation or story examples
        if you use a component explorer\n- Examples of selected versus unselected
        cards\n\n## Acceptance checks\n\n- Future prompts can compose the workflow
        from reusable parts rather than one-off markup.\n- Selection cards feel appropriate
        for genres, tones, pitches, and character sheets.\n- Validation and helper
        text are visually consistent.\n\n## Notes\n\nBuild just enough system to accelerate
        the workflow screens.\n\n## Suggested commit label\n\n`feat(prompt-27): reusable
        form and card components`\n"
    - filename: 28-error-loading-and-feedback-states.md
      content: "# 28 — Error, Loading, and Feedback States\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nPrepare the frontend
        to communicate progress and failure clearly before real asynchronous workflows
        arrive.\n\n## Build\n- Add skeletons, inline spinners, toast notifications,
        banner errors, and connection-state UI that match the product style.\n- Create
        a consistent feedback pattern for retriable errors versus blocking errors.\n\
        - Add a simple error boundary around the workspace so unexpected crashes fail
        loudly but usefully.\n\n## Deliverables\n\n- Common feedback components\n\
        - Toast or notification layer\n- Workspace error boundary\n\n## Acceptance
        checks\n\n- The app has a consistent way to report async state across screens.\n\
        - A failed API call does not leave the UI mysteriously blank.\n- The error
        boundary makes debugging easier during development.\n\n## Notes\n\nCalm and
        clear beats flashy.\n\n## Suggested commit label\n\n`feat(prompt-28): error
        loading and feedback states`\n"
    - filename: 29-frontend-websocket-client-skeleton.md
      content: "# 29 — Frontend WebSocket Client Skeleton\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nLay the groundwork
        for live session updates on the frontend without fully wiring the backend
        transport yet.\n\n## Build\n- Create a WebSocket client abstraction that can
        connect to a session-specific channel, reconnect, and dispatch typed events
        into the frontend state layer.\n- Add a thin reducer or event handler layer
        that can merge stage updates, chat events, and progress events into the current
        session state.\n- Expose connection status to the UI so the workspace can
        show whether live updates are healthy.\n\n## Deliverables\n\n- WebSocket client
        abstraction\n- Event reducer wiring\n- Connection status indicator\n\n## Acceptance
        checks\n\n- The frontend can accept typed live events without each component
        opening its own socket.\n- Reconnect behavior is thought through at least
        minimally.\n- Connection state is visible for debugging and later user trust.\n\
        \n## Notes\n\nKeep transport code isolated from presentation components.\n\
        \n## Suggested commit label\n\n`feat(prompt-29): frontend websocket client
        skeleton`\n"
    - filename: 30-chat-to-ui-action-schema.md
      content: "# 30 — Chat-to-UI Action Schema\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nDefine the structured action
        language that lets chat messages propose concrete UI operations without directly
        mutating the interface in ad hoc ways.\n\n## Build\n- Create a typed schema
        for UI actions such as selecting a genre, selecting a tone, updating the brief,
        regenerating pitches, choosing a pitch, refining character details, starting
        composition, pausing jobs, or changing audio settings.\n- Include fields for
        confidence, rationale, target stage, required confirmation, and any extracted
        structured values.\n- Document which actions can be applied automatically
        and which should surface as suggested actions awaiting user confirmation.\n\
        \n## Deliverables\n\n- Shared UI action schema\n- Backend and frontend type
        definitions\n- Policy note on auto-apply versus confirm-first actions\n\n\
        ## Acceptance checks\n\n- Chat intent handling has a stable contract before
        any model is asked to emit actions.\n- The action set covers the required
        workflow stages from the brief.\n- Risky or destructive actions can be gated
        behind confirmation.\n\n## Notes\n\nDo not let the agent directly manipulate
        the UI without a typed contract.\n\n## Suggested commit label\n\n`feat(prompt-30):
        chat to ui action schema`\n"
    - filename: 31-intent-parser-service.md
      content: "# 31 — Gemini-Powered Intent Parser Service\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nImplement a backend
        service that uses a fast Gemini model to translate user chat messages into
        structured UI actions and assistant replies.\n\n## Build\n- Create a backend
        intent-parsing service that sends the current stage context, session summary,
        and user message to Gemini and requests strict structured output.\n- Use a
        fast, economical model for this translation step and keep model selection
        configurable from settings.\n- Return both the structured actions and a natural-language
        assistant response or clarification summary.\n\n## Deliverables\n\n- Intent
        parser service\n- Prompt template for action extraction\n- Tests with representative
        chat messages\n\n## Acceptance checks\n\n- A user message like ‘make it a
        little more mysterious and shorter’ can become structured proposed updates.\n\
        - The service is isolated behind a backend API and never exposes API keys
        to the browser.\n- The parser can fail gracefully when the message is too
        vague.\n\n## Notes\n\nKeep prompts and outputs auditable. Store the structured
        result in the event log.\n\n## Suggested commit label\n\n`feat(prompt-31):
        intent parser service`\n"
    - filename: 32-ui-action-policy-engine.md
      content: "# 32 — UI Action Policy Engine\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nCreate a deterministic
        policy layer that decides whether a proposed action is valid in the current
        session state and how it should be applied.\n\n## Build\n- Implement validation
        rules based on current stage, selected entities, job status, and whether a
        change requires regeneration of downstream artifacts.\n- Allow the policy
        engine to mark actions as accepted, rejected, requires confirmation, or accepted-with-side-effects.\n\
        - Return structured reasons so the chat and UI can explain what happened.\n\
        \n## Deliverables\n\n- Policy engine for proposed UI actions\n- Tests for
        valid and invalid action sequences\n- Clear error or confirmation messages\n\
        \n## Acceptance checks\n\n- The system prevents impossible state changes like
        selecting a tone before a genre exists unless it first proposes a prerequisite
        action.\n- Downstream invalidation is explicit when upstream inputs change.\n\
        - The engine is deterministic and testable without calling Gemini.\n\n## Notes\n\
        \nTreat the model as a proposal generator, not the source of truth.\n\n##
        Suggested commit label\n\n`feat(prompt-32): ui action policy engine`\n"
    - filename: 33-action-echoes-in-chat.md
      content: "# 33 — Reflect UI Actions Back Into the Chat Log\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nMake UI changes
        and chat-driven actions visible inside the conversation so the user sees one
        coherent history of what happened.\n\n## Build\n- When a user clicks or changes
        something in the main pane, append a compact action message or summary into
        the chat history.\n- When a chat message produces an applied action, add an
        action echo that explains what changed in the UI.\n- Render these action echoes
        differently from normal assistant text so the history stays readable.\n\n\
        ## Deliverables\n\n- Chat action-echo rendering\n- Backend or frontend event
        wiring for echoes\n- Design rules for compact action summaries\n\n## Acceptance
        checks\n\n- The chat log and UI do not drift apart conceptually.\n- A resumed
        session can show how a key choice was made even if it was made in the UI rather
        than typed.\n- Action messages are concise and informative.\n\n## Notes\n\n\
        This feature is about trust and coherence.\n\n## Suggested commit label\n\n\
        `feat(prompt-33): action echoes in chat`\n"
    - filename: 34-ui-events-to-agent-context.md
      content: "# 34 — Send UI Events Back Into Agent Context\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nEnsure the agent
        can see important UI-side changes so follow-up chat turns are grounded in
        the current session rather than stale assumptions.\n\n## Build\n- Whenever
        the user changes a structured field in the UI, record a normalized event that
        can be fed into later model prompts or summaries.\n- Update the session snapshot
        and any rolling context summary used by the backend agent services.\n- Make
        sure UI-originated edits can trigger downstream regeneration flags when appropriate.\n\
        \n## Deliverables\n\n- Normalized UI event pipeline\n- Session snapshot update
        logic\n- Context summary update path\n\n## Acceptance checks\n\n- The agent
        can respond accurately after a user changes a field directly in the UI.\n\
        - UI-originated updates are durable and replayable.\n- The context mechanism
        avoids re-reading the entire event history on every model call if practical.\n\
        \n## Notes\n\nDo not rely on the browser alone as the source of truth.\n\n\
        ## Suggested commit label\n\n`feat(prompt-34): ui events to agent context`\n"
    - filename: 35-chat-commands-and-quick-actions.md
      content: "# 35 — Chat Commands and Quick Actions\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nAdd a small set of
        explicit commands and shortcut actions that make the workspace feel powerful
        without hiding everything behind free-form chat.\n\n## Build\n- Support a
        few simple slash-style commands or quick action chips such as regenerate pitches,
        summarize current plan, pause writing, resume writing, or move to next stage.\n\
        - Make these commands resolve through the same action schema and policy engine
        as free-form messages.\n- Keep the command list discoverable in the chat UI
        without overwhelming the user.\n\n## Deliverables\n\n- Quick action UI\n-
        Optional slash command support\n- Shared command-to-action mapping\n\n## Acceptance
        checks\n\n- Explicit commands reduce friction for common actions.\n- The implementation
        reuses the structured action pipeline rather than bypassing it.\n- The command
        surface is small and relevant.\n\n## Notes\n\nCommands should feel like conveniences,
        not a separate product.\n\n## Suggested commit label\n\n`feat(prompt-35):
        chat commands and quick actions`\n"
    - filename: 36-conversation-memory-summaries.md
      content: "# 36 — Conversation Memory and Rolling Summaries\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nCreate a compact
        memory mechanism so the system can retain story decisions and conversation
        context across long sessions without stuffing full chat history into every
        prompt.\n\n## Build\n- Implement a rolling session summary that captures current
        story decisions, unresolved questions, and user preferences at key checkpoints.\n\
        - Update the summary after meaningful events such as pitch selection, character
        selection, beat revisions, and composition interruptions.\n- Store both the
        latest summary and any useful previous snapshots so debugging and replay stay
        possible.\n\n## Deliverables\n\n- Rolling summary service\n- Summary update
        triggers\n- Tests around summary correctness or basic coverage\n\n## Acceptance
        checks\n\n- Later model calls can stay grounded without receiving the entire
        raw chat log.\n- The summary reflects the latest accepted decisions rather
        than stale drafts.\n- A resumed session can restore context quickly.\n\n##
        Notes\n\nSummaries should be factual and structured, not flowery.\n\n## Suggested
        commit label\n\n`feat(prompt-36): conversation memory summaries`\n"
    - filename: 37-agent-tool-registry.md
      content: "# 37 — Agent Tool Registry for Story Workflow Operations\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nOrganize the
        backend’s callable story operations into a clear registry so planning, generation,
        and chat translation can share the same action vocabulary.\n\n## Build\n-
        Define backend tools or service functions for operations like generate pitches,
        refine pitch, generate character sheets, refine character sheet, generate
        beat sheet, update setup heuristics, compose next segment, rewrite segments,
        estimate audio length, and start audio generation.\n- Describe the inputs,
        outputs, and side effects of each tool in a central registry.\n- Use the registry
        to reduce duplicate logic across routes, workers, and future model orchestration.\n\
        \n## Deliverables\n\n- Tool registry or capability map\n- Centralized tool
        interfaces\n- Documentation of side effects and expected outputs\n\n## Acceptance
        checks\n\n- Story operations are discoverable in one place.\n- The chat/action
        layer and the worker layer call the same domain services.\n- Adding a new
        stage operation later would be straightforward.\n\n## Notes\n\nKeep tools
        thin wrappers around real business services.\n\n## Suggested commit label\n\
        \n`feat(prompt-37): agent tool registry`\n"
    - filename: 38-session-replay-and-resume-hydration.md
      content: "# 38 — Session Replay and Resume Hydration\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nMake session
        resume trustworthy by defining how the backend rebuilds the current workspace
        state from durable records.\n\n## Build\n- Implement backend logic that can
        build a full session snapshot from relational records plus the latest accepted
        artifacts and summaries.\n- Decide when to use event replay, when to use materialized
        session state, and how to reconcile the two safely.\n- Expose a session hydration
        endpoint used by the workspace route on load.\n\n## Deliverables\n\n- Session
        hydration endpoint\n- Backend replay/hydration service\n- Tests for resuming
        sessions in different stages\n\n## Acceptance checks\n\n- A user can leave
        mid-session and return to a coherent workspace.\n- Hydration works for completed
        sessions as well as in-progress ones.\n- The restore path can represent active
        or failed jobs honestly.\n\n## Notes\n\nFast hydration matters, but correctness
        matters more.\n\n## Suggested commit label\n\n`feat(prompt-38): session replay
        and resume hydration`\n"
    - filename: 39-bridge-and-replay-tests.md
      content: "# 39 — Bridge and Replay Tests\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nAdd end-to-end-ish coverage
        around the chat/UI bridge and session replay before deeper workflow logic
        is layered on top.\n\n## Build\n- Test representative user messages turning
        into structured actions and then into durable state changes.\n- Test that
        UI-originated changes appear in chat history and can be replayed into a resumed
        session snapshot.\n- Add a few negative tests for invalid actions and rejected
        transitions.\n\n## Deliverables\n\n- Backend tests for the action pipeline\n\
        - Frontend or integration tests for action echoes\n- Replay/resume coverage\n\
        \n## Acceptance checks\n\n- The bridge behavior is proven before it becomes
        central to the product experience.\n- A bad proposed action produces a clear
        rejection path.\n- Replay and hydration logic are not left untested.\n\n##
        Notes\n\nThese tests are about product integrity more than implementation
        detail.\n\n## Suggested commit label\n\n`feat(prompt-39): bridge and replay
        tests`\n"
    - filename: 40-genre-selection-api-and-ui.md
      content: "# 40 — Genre Selection API and UI\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nImplement the first real
        workflow step: selecting a genre from the curated catalog.\n\n## Build\n-
        Add a backend endpoint that returns the available genres with descriptions
        and any lightweight bedtime-safety notes.\n- Build the genre selection stage
        UI with selectable cards, helpful descriptions, and a clear next-step path.\n\
        - Persist the selected genre durably and reflect the action in the session
        history and chat log.\n\n## Deliverables\n\n- Genre catalog endpoint\n- Genre
        selection stage UI\n- Persistence for the selected genre\n\n## Acceptance
        checks\n\n- The user can pick from the researched genre list rather than free-typing
        a genre from scratch.\n- The selected genre survives page refresh and session
        resume.\n- The UI makes it obvious that tone choices will be filtered next.\n\
        \n## Notes\n\nUse the seeded catalog as the source of truth.\n\n## Suggested
        commit label\n\n`feat(prompt-40): genre selection api and ui`\n"
    - filename: 41-tone-selection-api-and-ui.md
      content: "# 41 — Tone Selection API and UI\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nImplement the tone-selection
        stage with preconfigured tones filtered by the selected genre.\n\n## Build\n\
        - Add a backend endpoint that returns tone choices for the current genre with
        short labels, summaries, and perhaps sample excerpts or descriptors.\n- Build
        the tone stage UI with selection cards and any supporting detail view needed
        to understand the options.\n- Persist tone selection and surface it through
        the session snapshot and chat/action history.\n\n## Deliverables\n\n- Tone
        catalog endpoint\n- Tone selection stage UI\n- Tone selection persistence\n\
        \n## Acceptance checks\n\n- Only tones relevant to the selected genre are
        shown.\n- Tone choices feel concrete and helpful rather than vague adjectives
        alone.\n- The selected tone is durable and resumable.\n\n## Notes\n\nLean
        on the research pack’s generic tone descriptions.\n\n## Suggested commit label\n\
        \n`feat(prompt-41): tone selection api and ui`\n"
    - filename: 42-story-setup-brief-form.md
      content: "# 42 — Story Setup Brief Form\n\nRead `base_prompt.md` first and preserve
        all prior prompt work.\n\n## Objective\n\nImplement the free-form story brief
        step where the user describes the kind of story they want to tell.\n\n## Build\n\
        - Create the UI for the user to enter a free-form story idea, desired themes,
        key images, target audience notes, and any must-have elements.\n- Persist
        the brief as durable session state, including revision history or at least
        last updated time.\n- Show a concise summary or preview so the user can see
        the brief at a glance before moving on.\n\n## Deliverables\n\n- Story brief
        backend fields and endpoint\n- Story setup stage UI\n- Basic validation and
        save behavior\n\n## Acceptance checks\n\n- The user can provide an open-ended
        prompt rather than being forced into a rigid form only.\n- The brief is durable
        and editable on resume.\n- The UI encourages helpful specificity without overwhelming
        the user.\n\n## Notes\n\nThis is the bridge between catalog selections and
        generative planning.\n\n## Suggested commit label\n\n`feat(prompt-42): story
        setup brief form`\n"
    - filename: 43-brief-normalization-service.md
      content: "# 43 — Normalize the User Brief Into Structured Preferences\n\nRead
        `base_prompt.md` first and preserve all prior prompt work.\n\n## Objective\n\
        \nUse Gemini to turn the user’s free-form brief into a structured planning
        summary that later stages can rely on.\n\n## Build\n- Build a backend service
        that extracts likely protagonist type, setting, emotional goal, constraint
        notes, bedtime-safety concerns, and candidate motifs from the user’s brief.\n\
        - Store the normalized preferences as structured data alongside the raw brief.\n\
        - Surface the normalized result in the UI as an editable interpretation, not
        as hidden magic.\n\n## Deliverables\n\n- Brief normalization service\n- Structured
        normalized brief model\n- UI summary panel for the extracted preferences\n\
        \n## Acceptance checks\n\n- Later generators can rely on structured preferences
        instead of reparsing raw prose every time.\n- The user can correct or override
        the extracted interpretation.\n- The normalized view stays clearly tied to
        the original brief.\n\n## Notes\n\nUse a Gemini model suited for structured
        output and keep the prompt strict.\n\n## Suggested commit label\n\n`feat(prompt-43):
        brief normalization service`\n"
    - filename: 44-pitch-generation-pipeline.md
      content: "# 44 — Story Pitch Generation Pipeline\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nGenerate a handful
        of candidate story pitches grounded in the selected genre, tone, and user
        brief.\n\n## Build\n- Implement a backend pitch-generation service that creates
        multiple differentiated pitches, each with a title, short hook, central conflict,
        and why-it-fits note.\n- Store generated pitch sets durably so the user can
        revisit them later.\n- Add UI rendering for the pitch cards in the main pane.\n\
        \n## Deliverables\n\n- Pitch generation service\n- Pitch persistence\n- Pitch
        selection UI cards\n\n## Acceptance checks\n\n- The app generates several
        meaningful options, not trivial rewrites of the same idea.\n- Pitch cards
        are easy to compare quickly.\n- The user can resume later and still see the
        previously generated options.\n\n## Notes\n\nKeep output shape stable and
        predictable.\n\n## Suggested commit label\n\n`feat(prompt-44): pitch generation
        pipeline`\n"
    - filename: 45-pitch-refinement-via-chat.md
      content: "# 45 — Pitch Selection and Refinement via Chat\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nLet the user
        choose a pitch, request alternatives, or refine a pitch through chat without
        breaking the structured workflow.\n\n## Build\n- Connect pitch-related chat
        intents to the action pipeline so messages like ‘give me three more that are
        gentler’ or ‘take pitch two but make it about siblings’ work.\n- Add UI affordances
        for selecting a pitch card or asking for another batch.\n- Persist the selected
        pitch and any refinement rationale.\n\n## Deliverables\n\n- Pitch refinement
        actions\n- Pitch selection persistence\n- UI and chat wiring for alternatives/refinements\n\
        \n## Acceptance checks\n\n- The user can refine the pitch both through direct
        UI clicks and through chat.\n- Selecting or refining a pitch is reflected
        in the chat history.\n- The final selected pitch becomes the durable source
        for later stages.\n\n## Notes\n\nKeep alternate batches linked to the same
        session rather than overwriting blindly.\n\n## Suggested commit label\n\n\
        `feat(prompt-45): pitch refinement via chat`\n"
    - filename: 46-character-sheet-generation.md
      content: "# 46 — Character Sheet Generation Pipeline\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nGenerate candidate
        character sheets for the chosen pitch in a form the user can compare and refine.\n\
        \n## Build\n- Build a character-sheet generator that outputs several candidate
        sets or several candidate lead-character concepts with supporting cast details.\n\
        - Include fields like role, goal, flaw, comfort trait, bedtime-safety notes,
        relationships, and visual anchors.\n- Persist these candidates and render
        them as readable comparison cards or panels.\n\n## Deliverables\n\n- Character
        sheet service\n- Character persistence model\n- Character sheet comparison
        UI\n\n## Acceptance checks\n\n- Character sheets feel distinct and useful
        for decision-making.\n- The output format supports later beat-sheet generation.\n\
        - Candidates are durable and resumable like pitches.\n\n## Notes\n\nOptimize
        for story function, not encyclopedia-level biography.\n\n## Suggested commit
        label\n\n`feat(prompt-46): character sheet generation`\n"
    - filename: 47-character-refinement-via-chat.md
      content: "# 47 — Character Sheet Selection and Refinement via Chat\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nAllow the user
        to select or refine character sheets through both UI controls and the chat
        interface.\n\n## Build\n- Wire character-related chat intents into structured
        actions such as selecting a sheet, adjusting a flaw, softening a voice, or
        regenerating alternatives.\n- Reflect accepted character changes back into
        both the main pane and the chat log.\n- Track whether downstream planning
        needs regeneration when a major character change happens.\n\n## Deliverables\n\
        \n- Character refinement action support\n- UI update and invalidation logic\n\
        - Persistence for selected/refined character sheet\n\n## Acceptance checks\n\
        \n- A character can be refined conversationally without losing structured
        data integrity.\n- Major character changes correctly flag later stages for
        refresh.\n- The selected character sheet is easy to inspect at any time.\n\
        \n## Notes\n\nDo not let free-form edits silently drift away from durable
        state.\n\n## Suggested commit label\n\n`feat(prompt-47): character refinement
        via chat`\n"
    - filename: 48-save-the-cat-beat-sheet-generation.md
      content: "# 48 — Save-the-Cat Beat Sheet Generation\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nGenerate a high-level
        beat sheet for the story using the Save the Cat framework adapted for bedtime
        storytelling.\n\n## Build\n- Implement a beat-sheet generator that outputs
        all required Save the Cat beats with short summaries, emotional intent, and
        any bedtime-specific softening notes.\n- Map the selected pitch and character
        sheet into the beat structure while keeping the result high level rather than
        full prose.\n- Persist the beat sheet as a structured artifact that can be
        revised and later used by composition.\n\n## Deliverables\n\n- Beat-sheet
        generation service\n- Structured beat-sheet model\n- Beat-sheet stage UI\n\
        \n## Acceptance checks\n\n- The generated beat sheet clearly includes the
        full Save the Cat progression, not a vague outline.\n- The beats feel appropriate
        for the chosen genre and tone.\n- The beat sheet is stored in a structured
        form that downstream services can consume.\n\n## Notes\n\nUse the research
        docs in this pack as direct guidance for beat purposes and bedtime adaptation.\n\
        \n## Suggested commit label\n\n`feat(prompt-48): save the cat beat sheet generation`\n"
    - filename: 49-beat-sheet-refinement-ui-and-chat.md
      content: "# 49 — Beat Sheet Refinement UI and Chat Controls\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nLet the user
        inspect, tweak, and regenerate specific beats through both structured UI controls
        and chat messages.\n\n## Build\n- Create a beat editor that shows the ordered
        beats, their summaries, and any stage-specific notes.\n- Support chat actions
        like intensify midpoint wonder, soften all-is-lost, or make the finale more
        playful.\n- Keep refinement history and mark downstream composition prompts
        as needing refresh after material beat changes.\n\n## Deliverables\n\n- Beat
        editor UI\n- Beat refinement backend actions\n- Change tracking for beat edits\n\
        \n## Acceptance checks\n\n- The beat sheet feels like a living plan the user
        can shape.\n- Beat changes flow cleanly into later planning and composition.\n\
        - Chat-based beat edits and UI edits stay synchronized.\n\n## Notes\n\nFavor
        clarity over dense plotting jargon in the UI.\n\n## Suggested commit label\n\
        \n`feat(prompt-49): beat sheet refinement ui and chat`\n"
    - filename: 50-story-length-duration-and-chapter-setup.md
      content: "# 50 — Story Length, Duration, and Chapter Setup\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nImplement the
        story setup stage where the user can choose soft planning targets such as
        word count, estimated read-aloud duration, and chapter organization.\n\n##
        Build\n- Build UI fields for desired word count, target read-aloud duration,
        chapter count, and optionally approximate scene count.\n- Persist these values
        as preferences rather than hard enforcement rules.\n- Explain in the UI that
        these parameters are correlated suggestions that guide composition instead
        of rigid constraints.\n\n## Deliverables\n\n- Story setup form UI\n- Backend
        persistence for setup preferences\n- Inline explanation of soft-target behavior\n\
        \n## Acceptance checks\n\n- The user can configure planning targets without
        being tricked into thinking they are guarantees.\n- The setup state is durable
        and revisitable.\n- The UI sets expectations clearly about flexible output.\n\
        \n## Notes\n\nUse language that is honest and calming.\n\n## Suggested commit
        label\n\n`feat(prompt-50): story length duration and chapter setup`\n"
    - filename: 51-correlation-heuristics.md
      content: "# 51 — Correlation Heuristics for Word Count, Runtime, and Chapters\n\
        \nRead `base_prompt.md` first and preserve all prior prompt work.\n\n## Objective\n\
        \nBuild simple heuristics that connect the user’s soft planning targets so
        the app can suggest coherent ranges and explain tradeoffs.\n\n## Build\n-
        Implement a heuristic service that estimates likely runtime from word count
        and narration speed assumptions, and likely chapter size from total words
        and chapter count.\n- Allow one field to suggest updates to related fields
        while still preserving user control.\n- Surface the heuristic assumptions
        in a compact, understandable way.\n\n## Deliverables\n\n- Planning heuristic
        service\n- Frontend hints or calculated summaries\n- Tests for the core calculations\n\
        \n## Acceptance checks\n\n- Changing one planning field can influence the
        others helpfully without feeling authoritarian.\n- Assumptions are inspectable
        rather than hidden.\n- The heuristics are simple enough to maintain and adjust
        later.\n\n## Notes\n\nDo not oversell precision here. Keep it explicitly approximate.\n\
        \n## Suggested commit label\n\n`feat(prompt-51): correlation heuristics`\n"
    - filename: 52-bedtime-safety-and-content-guidelines.md
      content: "# 52 — Bedtime Safety and Content Guidelines\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nAdd product rules
        that keep generated bedtime stories emotionally safe, age-appropriate, and
        soothing even when they include tension or mystery.\n\n## Build\n- Define
        guidance for maximum scare level, violence avoidance, reassuring resolution,
        and emotional repair after tension.\n- Store these guidelines centrally so
        pitch, character, beat, composition, and audio prompts can all reuse them.\n\
        - Allow future expansion for audience-age presets even if the first version
        stays simple.\n\n## Deliverables\n\n- `docs/bedtime-guidelines.md`\n- Reusable
        backend prompt fragments or policy constants\n- A plan for audience-age defaults\n\
        \n## Acceptance checks\n\n- The product has explicit rules for what makes
        a story bedtime-safe.\n- These rules are reusable across the pipeline instead
        of copied into random prompts.\n- The guidance still leaves room for adventure
        and wonder.\n\n## Notes\n\nBedtime-safe does not mean flat or boring.\n\n\
        ## Suggested commit label\n\n`feat(prompt-52): bedtime safety and content
        guidelines`\n"
    - filename: 53-outline-drill-down.md
      content: "# 53 — Outline Drill-Down From Beats to Chapters or Scenes\n\nRead
        `base_prompt.md` first and preserve all prior prompt work.\n\n## Objective\n\
        \nTransform the high-level beat sheet into a more detailed chapter or scene
        plan that composition can execute in segments.\n\n## Build\n- Create a planning
        service that expands beats into chapter or scene cards based on the current
        story setup preferences.\n- Show which beat or beats each chapter card supports
        and what emotional shift it should carry.\n- Persist the resulting outline
        as structured data that can be edited later.\n\n## Deliverables\n\n- Detailed
        outline generation service\n- Chapter/scene card UI\n- Outline persistence
        model\n\n## Acceptance checks\n\n- The system has a clear bridge from beat
        sheet to draftable writing segments.\n- Chapter cards preserve the selected
        tone, genre, and setup constraints.\n- The outline remains editable rather
        than frozen.\n\n## Notes\n\nThe goal is a practical writing plan, not an over-elaborate
        artifact.\n\n## Suggested commit label\n\n`feat(prompt-53): outline drill
        down`\n"
    - filename: 54-chapter-scene-card-editor.md
      content: "# 54 — Chapter and Scene Card Editor\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nLet the user inspect
        and lightly edit the detailed outline before composition begins.\n\n## Build\n\
        - Build UI for chapter or scene cards with title, purpose, linked beat, target
        length, and summary.\n- Support reorder, light edits, and regenerate-this-card
        interactions where sensible.\n- Make downstream invalidation explicit if the
        user edits cards significantly.\n\n## Deliverables\n\n- Outline card editor
        UI\n- Card update actions\n- Change propagation rules\n\n## Acceptance checks\n\
        \n- The user can shape the plan at a granular level without redoing the entire
        pipeline.\n- Each card has enough information to guide composition.\n- Edits
        are durable and reflected in the session summary.\n\n## Notes\n\nKeep editing
        structured. Avoid turning this into a full free-form outliner.\n\n## Suggested
        commit label\n\n`feat(prompt-54): chapter scene card editor`\n"
    - filename: 55-continuity-bible.md
      content: "# 55 — Continuity Bible and World-State Tracker\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nCreate a structured
        continuity record that helps the app stay consistent during long composition
        and rewrite flows.\n\n## Build\n- Track facts about characters, locations,
        objects, promises, voice constraints, and unresolved threads.\n- Update the
        continuity bible when the user accepts major planning decisions and when composition
        locks in details worth preserving.\n- Make the continuity record inspectable
        for debugging and future refinement.\n\n## Deliverables\n\n- Continuity model
        or service\n- Update hooks from planning stages\n- Optional UI inspector for
        continuity facts\n\n## Acceptance checks\n\n- The system has a durable place
        to remember canonical details.\n- Continuity data can inform later composition
        prompts and rewrite decisions.\n- The record is concise enough to stay useful.\n\
        \n## Notes\n\nThis should reduce contradictions, not create busywork.\n\n\
        ## Suggested commit label\n\n`feat(prompt-55): continuity bible`\n"
    - filename: 56-revision-history-and-branches.md
      content: "# 56 — Revision History and Branch-Like Tracking for Plan Changes\n\
        \nRead `base_prompt.md` first and preserve all prior prompt work.\n\n## Objective\n\
        \nGive the user safety when changing plans by preserving prior accepted states
        rather than destructively overwriting everything.\n\n## Build\n- Record important
        planning artifacts with versions or snapshots so the app can show what changed
        over time.\n- Allow the session to know which version of pitch, character
        sheet, beat sheet, and outline are current.\n- Expose a lightweight compare
        or restore capability for key planning artifacts.\n\n## Deliverables\n\n-
        Versioning strategy for planning artifacts\n- Metadata for current versus
        previous revisions\n- Optional compare/restore UI stubs\n\n## Acceptance checks\n\
        \n- Users can make changes without feeling one click away from losing the
        previous plan.\n- Composition can point to the specific plan revision it is
        based on.\n- The history model stays understandable.\n\n## Notes\n\nA simple
        revision model is enough; full git-for-stories is not required.\n\n## Suggested
        commit label\n\n`feat(prompt-56): revision history and branches`\n"
    - filename: 57-composition-prompt-assembly.md
      content: "# 57 — Composition Prompt Assembly\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nAssemble the structured
        inputs the writing engine will need so segment generation is grounded and
        consistent.\n\n## Build\n- Build a backend prompt-assembly service that gathers
        genre, tone, brief, selected pitch, character sheet, beat sheet, setup preferences,
        outline card, continuity facts, and bedtime guidelines.\n- Separate stable
        system instructions from per-segment dynamic context.\n- Store or log the
        assembled prompt context in a debuggable but safe way.\n\n## Deliverables\n\
        \n- Prompt assembly service\n- Prompt input schema\n- Debug-friendly prompt
        context logging strategy\n\n## Acceptance checks\n\n- Composition has a single
        source for prompt assembly rather than hand-built prompts scattered across
        the codebase.\n- Stable guidance and dynamic context are clearly separated.\n\
        - The assembled context is inspectable when writing quality goes wrong.\n\n\
        ## Notes\n\nTreat prompt assembly as application code, not an afterthought.\n\
        \n## Suggested commit label\n\n`feat(prompt-57): composition prompt assembly`\n"
    - filename: 58-usage-cost-and-latency-metrics.md
      content: "# 58 — Usage, Cost, and Latency Metrics\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nTrack model usage,
        timing, and approximate cost so the app can stay observable as more Gemini
        calls are introduced.\n\n## Build\n- Log the purpose of each model call, the
        model used, elapsed time, and any token or cost metadata that is available.\n\
        - Persist per-session summaries or lightweight counters for planning, composition,
        and audio usage.\n- Expose a developer-facing summary view or log report.\n\
        \n## Deliverables\n\n- Model usage metrics capture\n- Per-session usage summary\n\
        - Developer-readable diagnostics output\n\n## Acceptance checks\n\n- You can
        answer ‘what is slow and what is expensive?’ without guessing.\n- Model choices
        are visible per workflow stage.\n- The metrics do not leak secrets or full
        private prompts unnecessarily.\n\n## Notes\n\nKeep the first version pragmatic
        and lightweight.\n\n## Suggested commit label\n\n`feat(prompt-58): usage cost
        and latency metrics`\n"
    - filename: 59-planning-funnel-e2e-test.md
      content: "# 59 — Planning Funnel End-to-End Test\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nAdd an integration
        or end-to-end test that proves the workflow from genre selection through detailed
        outline works as one coherent funnel.\n\n## Build\n- Simulate or mock the
        necessary model calls to exercise genre selection, tone selection, brief capture,
        pitch generation, character generation, beat-sheet generation, and story setup.\n\
        - Assert that the session ends the flow with a usable structured outline and
        consistent stage state.\n- Document what remains mocked and what is exercising
        real infrastructure.\n\n## Deliverables\n\n- Planning-funnel test\n- Fixtures
        or mocks for model outputs\n- Short test design note\n\n## Acceptance checks\n\
        \n- A regression in the planning funnel would be caught before shipping.\n\
        - The test proves durable state evolves correctly across multiple stages.\n\
        - Mocks are realistic enough to exercise UI and backend assumptions.\n\n##
        Notes\n\nThis test should feel close to the real product journey.\n\n## Suggested
        commit label\n\n`feat(prompt-59): planning funnel e2e test`\n"
    - filename: 60-composition-job-orchestration.md
      content: "# 60 — Composition Job Orchestration\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nTurn story composition
        into a durable background job that can stream progress to the UI while preserving
        state in PostgreSQL and object storage.\n\n## Build\n- Define a composition
        job type, payload shape, status lifecycle, and progress semantics.\n- Create
        API endpoints or actions for starting composition, pausing, resuming, and
        canceling or redirecting a composition job.\n- Make sure composition jobs
        persist their current segment, current plan revision, and latest partial output.\n\
        \n## Deliverables\n\n- Composition job backend flow\n- Start/pause/resume
        endpoints or actions\n- Durable progress model\n\n## Acceptance checks\n\n\
        - Composition can run outside the request lifecycle.\n- The system knows exactly
        what segment is being written and against which plan revision.\n- Pause/resume
        does not rely on the browser staying open.\n\n## Notes\n\nDurability matters
        more than raw throughput in this first version.\n\n## Suggested commit label\n\
        \n`feat(prompt-60): composition job orchestration`\n"
    - filename: 61-segmented-writing-engine.md
      content: "# 61 — Segmented Writing Engine\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nImplement the backend writing
        engine that drafts the story one segment at a time rather than attempting
        a huge monolithic generation.\n\n## Build\n- Choose a sensible segment unit
        such as chapter, scene, or sub-scene and define how the engine advances from
        one unit to the next.\n- For each segment, assemble context from the current
        plan, prior accepted text summary, continuity bible, and local segment goals.\n\
        - Persist the raw generated text, accepted text, and any summary needed for
        the next segment.\n\n## Deliverables\n\n- Segmented writing service\n- Segment
        persistence records\n- Strategy note for context carryover between segments\n\
        \n## Acceptance checks\n\n- The engine can write incrementally through the
        story plan.\n- Context is carried forward in a structured way instead of blindly
        concatenating the full draft every time.\n- Each segment has durable records
        suitable for rewrite later.\n\n## Notes\n\nOptimize for controllability and
        rewrite support.\n\n## Suggested commit label\n\n`feat(prompt-61): segmented
        writing engine`\n"
    - filename: 62-composition-streaming-events.md
      content: "# 62 — Composition Streaming Events\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nStream composition
        progress and text chunks to the frontend in a way that supports a live typewriter-style
        experience.\n\n## Build\n- Emit real-time events for segment start, chunk
        streamed, segment summary, overall progress, pause, rewrite, and completion.\n\
        - Choose chunk sizes and timing that make the text feel lively and faster
        than typical reading pace without overwhelming the UI.\n- Persist enough progress
        metadata that the UI can recover after reconnect.\n\n## Deliverables\n\n-
        Real-time composition event emission\n- Chunking strategy\n- Reconnect/recovery
        behavior for streaming state\n\n## Acceptance checks\n\n- The frontend can
        display a live writing experience rather than only final text dumps.\n- Chunk
        timing feels intentional and readable.\n- A reconnecting client can recover
        the latest accepted state.\n\n## Notes\n\nKeep event names aligned with the
        real-time schema from earlier prompts.\n\n## Suggested commit label\n\n`feat(prompt-62):
        composition streaming events`\n"
    - filename: 63-composition-main-pane-ui.md
      content: "# 63 — Composition Main-Pane UI\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nBuild the main-pane composition
        experience with live text, visible progress, and a clear sense of where the
        story currently is.\n\n## Build\n- Create the composition stage UI with a
        live text area, current segment label, recent segment summary, and overall
        story progress bar.\n- Show the most recently generated text prominently while
        keeping earlier accepted text accessible.\n- Render job controls for pause,
        resume, request rewrite, and return to plan if applicable.\n\n## Deliverables\n\
        \n- Composition stage UI\n- Progress indicators\n- Visible controls for live
        composition\n\n## Acceptance checks\n\n- The UI makes writing feel alive and
        comprehensible.\n- The user can tell how far through the overall story the
        system is.\n- Controls are present without cluttering the experience.\n\n\
        ## Notes\n\nDo not bury progress behind small text.\n\n## Suggested commit
        label\n\n`feat(prompt-63): composition main pane ui`\n"
    - filename: 64-agent-summary-messages-during-composition.md
      content: "# 64 — Agent Summary Messages During Composition\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nHave the agent
        periodically post compact chat summaries of what it is currently writing so
        the user can intervene meaningfully.\n\n## Build\n- Emit periodic chat-style
        assistant summaries describing the current segment, narrative direction, and
        any immediate thematic focus.\n- Link these summaries to the composition progress
        so they arrive at meaningful checkpoints rather than random intervals.\n-
        Ensure the summaries are grounded in actual generated work, not hallucinated
        meta-commentary.\n\n## Deliverables\n\n- Composition summary message logic\n\
        - Chat integration for summaries\n- Checkpoint strategy for when summaries
        appear\n\n## Acceptance checks\n\n- The user can understand what the system
        is doing mid-stream.\n- Summary messages help the user decide whether to interrupt
        or let it continue.\n- Summaries are concise and tied to real progress.\n\n\
        ## Notes\n\nThink of these as narration of process, not filler.\n\n## Suggested
        commit label\n\n`feat(prompt-64): agent summary messages during composition`\n"
    - filename: 65-interrupt-and-redirect-composition.md
      content: "# 65 — Interrupt, Pause, and Redirect Composition via Chat or UI\n\
        \nRead `base_prompt.md` first and preserve all prior prompt work.\n\n## Objective\n\
        \nLet the user meaningfully steer composition while it is happening instead
        of treating writing as an uninterruptible batch job.\n\n## Build\n- Support
        pause and redirect actions through both chat and explicit UI controls.\n-
        When interrupted, capture what segment was active and the user’s requested
        change so the worker can re-plan safely.\n- Create a deterministic backend
        path for how active composition responds to interruptions.\n\n## Deliverables\n\
        \n- Interrupt/pause/resume control flow\n- Persistence for interruption requests\n\
        - User-visible status changes during interruption handling\n\n## Acceptance
        checks\n\n- The user can alter direction mid-composition without corrupting
        session state.\n- The system explains whether it is pausing, applying a redirect,
        or waiting for confirmation.\n- Interruptions are durable and replayable.\n\
        \n## Notes\n\nBe explicit about how in-flight work is handled.\n\n## Suggested
        commit label\n\n`feat(prompt-65): interrupt and redirect composition`\n"
    - filename: 66-rewrite-prior-segments.md
      content: "# 66 — Rewrite Prior Segments and Regenerate Downstream Text\n\nRead
        `base_prompt.md` first and preserve all prior prompt work.\n\n## Objective\n\
        \nAllow the system to revisit already written portions of the story and cascade
        necessary updates forward when upstream changes matter.\n\n## Build\n- Create
        a rewrite flow that can target a selected segment or range of segments with
        explicit user instructions.\n- Mark downstream segments as stale when a rewrite
        would affect continuity and decide whether to auto-regenerate or require confirmation.\n\
        - Preserve prior versions so the user can compare before accepting a rewrite.\n\
        \n## Deliverables\n\n- Rewrite service for segments\n- Stale/downstream invalidation
        logic\n- Version preservation for rewritten text\n\n## Acceptance checks\n\
        \n- The product can support serious mid-stream course corrections.\n- Continuity-aware
        downstream handling is explicit.\n- Older segment versions remain inspectable.\n\
        \n## Notes\n\nThis is a core differentiator. Treat it carefully.\n\n## Suggested
        commit label\n\n`feat(prompt-66): rewrite prior segments`\n"
    - filename: 67-diff-and-compare-ui.md
      content: "# 67 — Diff and Compare UI for Rewrites\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nGive the user a practical
        way to compare rewritten story text against prior text before accepting changes.\n\
        \n## Build\n- Build a simple compare view that shows old versus new text for
        a segment or highlighted diff regions.\n- Allow the user to accept the rewrite,
        reject it, or keep exploring alternatives.\n- Make the compare UI available
        from both the composition stage and later final review if practical.\n\n##
        Deliverables\n\n- Rewrite compare UI\n- Accept/reject controls\n- Backend
        support for selecting active text version\n\n## Acceptance checks\n\n- Users
        can understand what changed without reading two unrelated walls of text blindly.\n\
        - Accepting a rewrite updates the canonical text cleanly.\n- Rejected rewrites
        do not pollute the live draft.\n\n## Notes\n\nReadable compare beats sophisticated
        compare.\n\n## Suggested commit label\n\n`feat(prompt-67): diff and compare
        ui`\n"
    - filename: 68-autosave-drafts-and-partials.md
      content: "# 68 — Autosave Drafts and Partial Outputs\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nPersist partial
        story drafts during composition so crashes or reconnects do not destroy progress.\n\
        \n## Build\n- Save accepted text snapshots and/or rolling draft artifacts
        during composition to durable storage.\n- Record enough metadata to restore
        the latest stable draft view on session resume.\n- Avoid excessive blob churn
        by choosing a sane autosave cadence or checkpoint strategy.\n\n## Deliverables\n\
        \n- Autosave logic for composition\n- Partial draft asset records\n- Resume
        logic for latest stable text\n\n## Acceptance checks\n\n- A partially composed
        story can survive worker restarts or browser refreshes.\n- Autosave does not
        create uncontrolled storage growth.\n- The latest stable text is easy to reconstruct.\n\
        \n## Notes\n\nCheckpointing strategy matters here.\n\n## Suggested commit
        label\n\n`feat(prompt-68): autosave drafts and partials`\n"
    - filename: 69-composition-loop-e2e-test.md
      content: "# 69 — Composition Loop End-to-End Test\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nAdd an integration
        or end-to-end test that proves segmented writing, streaming progress, interruption,
        and resume all work together.\n\n## Build\n- Simulate a composition job with
        mocked model outputs and verify that progress, chunk events, and final text
        land in durable state correctly.\n- Test at least one interruption or rewrite
        path mid-composition.\n- Assert that a resumed session shows the right latest
        story text and job state.\n\n## Deliverables\n\n- Composition-loop test\n\
        - Mock or fixture outputs for segments\n- Documentation of what the test exercises\n\
        \n## Acceptance checks\n\n- A regression in the most dynamic part of the app
        would be caught.\n- The test covers durability plus live updates, not only
        static text generation.\n- Resume behavior is verified under realistic circumstances.\n\
        \n## Notes\n\nKeep the test scenario focused but real.\n\n## Suggested commit
        label\n\n`feat(prompt-69): composition loop e2e test`\n"
    - filename: 70-audio-settings-model-and-ui.md
      content: "# 70 — Audio Settings Model and UI\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nImplement the audio
        stage where the user can choose narration voice, background music behavior,
        playback speed, and other audio preferences.\n\n## Build\n- Create backend
        and frontend models for audio preferences such as voice ID, narration style,
        speed multiplier, music toggle, music style, and volume preferences.\n- Build
        the audio settings stage UI with clear explanations of what each setting changes.\n\
        - Persist these settings as durable session state and reflect them in chat/action
        history when changed.\n\n## Deliverables\n\n- Audio settings data model\n\
        - Audio settings stage UI\n- Persistence for selected audio options\n\n##
        Acceptance checks\n\n- The user can configure voice, music, and speed in one
        coherent place.\n- Settings survive refresh and session resume.\n- The product
        communicates that final runtime is estimated, not guaranteed.\n\n## Notes\n\
        \nKeep the initial control set useful but not overwhelming.\n\n## Suggested
        commit label\n\n`feat(prompt-70): audio settings model and ui`\n"
    - filename: 71-audio-length-estimation.md
      content: "# 71 — Audio Length Estimation Heuristics\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nEstimate how
        long the completed narration will be based on draft length and audio settings
        so the user has a realistic expectation before generation begins.\n\n## Build\n\
        - Implement a heuristic that converts story length into estimated narrated
        runtime while accounting for speed settings and optionally chapter pauses.\n\
        - Show the estimate in the audio stage UI and update it when the user changes
        speed or when the story draft changes materially.\n- Make the assumptions
        transparent and easy to adjust later.\n\n## Deliverables\n\n- Audio length
        estimation service\n- UI display of estimated runtime\n- Tests around the
        core estimate calculations\n\n## Acceptance checks\n\n- Users can see a plausible
        length estimate before committing to audio generation.\n- The estimate updates
        when the main influencing inputs change.\n- The UI labels the result as approximate.\n\
        \n## Notes\n\nA good heuristic is enough; fake precision is not.\n\n## Suggested
        commit label\n\n`feat(prompt-71): audio length estimation`\n"
    - filename: 72-narration-segmentation.md
      content: "# 72 — Narration Segmentation Strategy\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nBreak the final story
        into narration-friendly segments so audio generation is resumable and aligned
        with chapter or scene structure.\n\n## Build\n- Create a service that splits
        story text into audio-generation segments using chapter or scene boundaries
        where possible.\n- Preserve metadata about segment order, text source range,
        and any pause or music transition hints.\n- Store the narration plan durably
        so the worker can resume from the last completed segment.\n\n## Deliverables\n\
        \n- Narration segmentation service\n- Segment metadata model\n- Rules for
        chapter pauses and boundaries\n\n## Acceptance checks\n\n- Audio work can
        be resumed segment by segment rather than restarted wholesale.\n- Segments
        map back to the story text cleanly.\n- Segmentation respects logical story
        boundaries where possible.\n\n## Notes\n\nSegment design should balance quality
        and recoverability.\n\n## Suggested commit label\n\n`feat(prompt-72): narration
        segmentation`\n"
    - filename: 73-gemini-tts-integration.md
      content: "# 73 — Gemini TTS Integration\n\nRead `base_prompt.md` first and preserve
        all prior prompt work.\n\n## Objective\n\nIntegrate the backend with Gemini
        text-to-speech generation behind a clean provider adapter.\n\n## Build\n-
        Create a TTS service adapter that accepts narration text plus voice/style
        settings and returns audio bytes or stored assets.\n- Keep the selected TTS
        model ID configurable so the app can track Google’s evolving Gemini TTS offerings
        without scattering model names through the codebase.\n- Handle local development,
        failures, retries, and response metadata cleanly.\n\n## Deliverables\n\n-
        Backend TTS adapter service\n- Config-driven TTS model selection\n- Error
        handling and retry policy for TTS calls\n\n## Acceptance checks\n\n- The rest
        of the app can request narration without knowing provider-specific details.\n\
        - TTS integration is isolated enough to change model IDs later.\n- Failures
        produce durable job status and useful error messages.\n\n## Notes\n\nKeep
        this adapter separate from text-generation services.\n\n## Suggested commit
        label\n\n`feat(prompt-73): gemini tts integration`\n"
    - filename: 74-background-music-mixing.md
      content: "# 74 — Background Music Mixing Pipeline\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nAdd optional background
        music handling so the final audio can include a gentle soundtrack when the
        user wants it.\n\n## Build\n- Define how music tracks are selected, stored,
        and associated with the session, even if the first version uses a small local
        curated set.\n- Build a mixing step using a dependable backend toolchain such
        as ffmpeg to combine narration and music with volume ducking or simple gain
        control.\n- Keep music optional and make sure voice clarity stays the priority.\n\
        \n## Deliverables\n\n- Music asset strategy\n- Backend mixing pipeline\n-
        Settings-to-mix parameter mapping\n\n## Acceptance checks\n\n- The user can
        choose narration with or without background music.\n- Mixed audio remains
        intelligible.\n- Music handling works as a later processing step instead of
        complicating raw TTS generation.\n\n## Notes\n\nStart with a small, curated
        music surface.\n\n## Suggested commit label\n\n`feat(prompt-74): background
        music mixing`\n"
    - filename: 75-audio-job-orchestration.md
      content: "# 75 — Audio Job Orchestration and Progress Events\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nTurn audio generation
        into a durable worker job with clear progress reporting just like composition.\n\
        \n## Build\n- Create an audio job type with segment-by-segment progress, retries,
        failure handling, and final assembly status.\n- Emit real-time progress events
        the frontend can use for bars, logs, and status text.\n- Persist partial audio
        segment artifacts and mark the final compiled audio when ready.\n\n## Deliverables\n\
        \n- Audio worker flow\n- Progress event emission for audio\n- Durable audio
        job records\n\n## Acceptance checks\n\n- Audio generation can survive browser
        refreshes and continue in the worker.\n- The frontend can show which stage
        of audio generation is happening now.\n- Partial outputs are durable for resume
        or debugging.\n\n## Notes\n\nMirror the composition job model where it makes
        sense.\n\n## Suggested commit label\n\n`feat(prompt-75): audio job orchestration`\n"
    - filename: 76-audio-preview-and-segment-status-ui.md
      content: "# 76 — Audio Preview and Segment Status UI\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nShow the user
        a trustworthy view of audio generation progress and allow spot-checking when
        useful.\n\n## Build\n- Build the audio stage UI with a progress bar, segment
        status list, estimated remaining work, and any ready-for-preview audio clips
        if available.\n- Allow the user to inspect which narration segments are complete,
        pending, or failed.\n- Keep the UI calm and understandable even while jobs
        are active.\n\n## Deliverables\n\n- Audio progress UI\n- Segment status rendering\n\
        - Optional preview player for ready segments\n\n## Acceptance checks\n\n-
        The user can tell whether audio is queued, generating, mixing, failed, or
        done.\n- Progress is detailed enough to inspire trust.\n- Ready previews are
        clearly distinguished from the final compiled file.\n\n## Notes\n\nUse the
        same design language as composition progress.\n\n## Suggested commit label\n\
        \n`feat(prompt-76): audio preview and segment status ui`\n"
    - filename: 77-final-audio-assembly.md
      content: "# 77 — Final Audio Assembly and Metadata\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nAssemble the
        completed audio segments into a final deliverable and record useful metadata
        about the output.\n\n## Build\n- Concatenate or otherwise assemble narration
        segments in the correct order and apply optional music mixing if enabled.\n\
        - Store the final audio asset in object storage and create a durable asset
        record with runtime, media type, and generation details.\n- Mark any superseded
        final outputs when the user regenerates audio after story changes.\n\n## Deliverables\n\
        \n- Final audio assembly service\n- Final asset metadata capture\n- Regeneration/update
        rules for final audio outputs\n\n## Acceptance checks\n\n- The app can produce
        one coherent final audio file from segmented work.\n- The final asset is easy
        to download and play in the UI.\n- Regenerated audio does not silently overwrite
        history without trace.\n\n## Notes\n\nTreat the final compiled audio as a
        first-class artifact.\n\n## Suggested commit label\n\n`feat(prompt-77): final
        audio assembly`\n"
    - filename: 78-download-endpoints-and-object-access.md
      content: "# 78 — Download Endpoints and Object Access\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nMake finished
        artifacts accessible to the frontend in a secure, explicit way.\n\n## Build\n\
        - Add backend endpoints for downloading or streaming finalized story exports
        and audio files.\n- Use the asset metadata model to validate access and map
        from session to artifact.\n- Keep emulator-specific details hidden behind
        the backend so the frontend only talks to your API.\n\n## Deliverables\n\n\
        - Artifact download endpoints\n- Streaming support where sensible\n- Frontend
        hooks for artifact retrieval\n\n## Acceptance checks\n\n- The browser can
        retrieve final story and audio artifacts through the app backend cleanly.\n\
        - The frontend does not need direct knowledge of storage buckets or object
        paths.\n- Downloads work for resumed sessions too.\n\n## Notes\n\nDesign with
        future auth in mind even if local mode is single-user.\n\n## Suggested commit
        label\n\n`feat(prompt-78): download endpoints and object access`\n"
    - filename: 79-audio-pipeline-tests.md
      content: "# 79 — Audio Pipeline Tests\n\nRead `base_prompt.md` first and preserve
        all prior prompt work.\n\n## Objective\n\nAdd coverage for narration segmentation,
        TTS integration boundaries, mixing, assembly, and progress reporting.\n\n\
        ## Build\n- Test the narration segmentation logic with representative story
        text and chapter structures.\n- Mock the TTS provider adapter and verify worker
        job state transitions, retries, and asset creation.\n- Add at least one test
        for final assembly and optional music mixing.\n\n## Deliverables\n\n- Audio
        pipeline test suite\n- TTS adapter mocks or fixtures\n- Test notes for what
        is mocked versus real\n\n## Acceptance checks\n\n- The audio pipeline has
        meaningful automated coverage before polish work begins.\n- A failed segment
        or assembly step is visible in tests.\n- The tests prove resumability and
        asset recording, not just happy-path bytes.\n\n## Notes\n\nThis test surface
        is about reliability.\n\n## Suggested commit label\n\n`feat(prompt-79): audio
        pipeline tests`\n"
    - filename: 80-finalize-screen-read-and-listen.md
      content: "# 80 — Finalize Screen With Read and Listen Modes\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nImplement the
        final review stage where the user can read the finished story, listen to the
        audio, and confirm the session feels complete.\n\n## Build\n- Build the finalize
        stage UI with tabs or sections for reading the final story text and listening
        to the final audio.\n- Show the final selected genre, tone, length settings,
        and generation status summaries in a compact review panel.\n- Make the stage
        tolerant of partial completion so, for example, story text can be ready before
        audio is ready.\n\n## Deliverables\n\n- Finalize stage UI\n- Read and listen
        surfaces\n- Session completion summary panel\n\n## Acceptance checks\n\n-
        A user can consume the finished story directly in the app.\n- The UI gracefully
        handles cases where audio is still processing or has failed.\n- The final
        stage feels like a real finish line.\n\n## Notes\n\nKeep the reading experience
        calm and uncluttered.\n\n## Suggested commit label\n\n`feat(prompt-80): finalize
        screen read and listen`\n"
    - filename: 81-docx-export-pipeline.md
      content: "# 81 — Word Document Export Pipeline\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nGenerate a downloadable
        Word document version of the completed story from the backend.\n\n## Build\n\
        - Add a backend export service that creates a `.docx` file containing title,
        metadata, chapter structure if present, and the full story text.\n- Store
        the generated document as an asset record in object storage.\n- Make export
        generation idempotent or regenerable when the story text changes.\n\n## Deliverables\n\
        \n- DOCX export service\n- Asset storage and metadata for the export\n- A
        backend endpoint or action that triggers export generation\n\n## Acceptance
        checks\n\n- The user can download the finished story as a Word document.\n\
        - The export is tied to the canonical final story text, not stale drafts.\n\
        - Generated exports are discoverable through the asset model.\n\n## Notes\n\
        \nDo not overcomplicate formatting. Clean, readable output is enough.\n\n\
        ## Suggested commit label\n\n`feat(prompt-81): docx export pipeline`\n"
    - filename: 82-html-markdown-and-reader-formatting.md
      content: "# 82 — Story Formatting for In-App Reading\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nPrepare clean,
        readable formatted story text for the in-app reader and any lightweight text
        export needs.\n\n## Build\n- Create a backend or frontend formatting layer
        that turns canonical story text into readable chaptered HTML or structured
        rich text for the app reader.\n- Preserve paragraph breaks, chapter headings,
        and any simple emphasis safely.\n- Keep the formatting pipeline deterministic
        so reading output and export output stay consistent.\n\n## Deliverables\n\n\
        - Reader formatting pipeline\n- In-app story rendering component\n- Formatting
        tests for chapter and paragraph structure\n\n## Acceptance checks\n\n- The
        in-app story text is pleasant to read.\n- Formatting is not brittle or dependent
        on model quirks.\n- Chapter structure, when present, is reflected clearly.\n\
        \n## Notes\n\nReader clarity matters more than ornamental typography.\n\n\
        ## Suggested commit label\n\n`feat(prompt-82): html markdown and reader formatting`\n"
    - filename: 83-artifact-packaging-and-links.md
      content: "# 83 — Artifact Packaging and Download Links\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nExpose all generated
        artifacts coherently so the user can retrieve the outputs they care about
        without hunting.\n\n## Build\n- Create a backend endpoint that returns a session’s
        current artifact inventory: final story text, docx export, final audio, and
        any useful preview assets.\n- Build the finalize stage download area with
        clear labels and readiness indicators.\n- Handle missing or outdated artifacts
        explicitly.\n\n## Deliverables\n\n- Artifact inventory endpoint\n- Finalize
        download section\n- Outdated/missing artifact messaging\n\n## Acceptance checks\n\
        \n- The user can see what artifacts exist for the session at a glance.\n-
        The UI distinguishes ready, generating, failed, and stale artifacts.\n- Download
        affordances map to real backend assets reliably.\n\n## Notes\n\nOne clean
        artifact panel beats scattered buttons.\n\n## Suggested commit label\n\n`feat(prompt-83):
        artifact packaging and links`\n"
    - filename: 84-reader-ui-with-navigation.md
      content: "# 84 — Reader UI With Chapter Navigation\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nMake the in-app
        reading experience usable for longer stories, especially when chapters are
        present.\n\n## Build\n- Add chapter navigation, a table of contents, or section
        jump controls in the reader UI.\n- Keep the reading surface focused, with
        comfortable line length and typography.\n- Allow the user to return easily
        to planning or audio settings from the reader if they want to make further
        changes.\n\n## Deliverables\n\n- Reader navigation UI\n- Comfortable reading
        layout\n- Convenient back-links to earlier stages\n\n## Acceptance checks\n\
        \n- Longer stories remain easy to navigate.\n- The finalize stage does not
        trap the user.\n- The reader layout feels intentionally designed for reading
        rather than raw text dump.\n\n## Notes\n\nRespect reading ergonomics.\n\n\
        ## Suggested commit label\n\n`feat(prompt-84): reader ui with navigation`\n"
    - filename: 85-audio-player-with-text-sync-hooks.md
      content: "# 85 — Audio Player With Hooks for Text Synchronization\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nBuild the in-app
        audio playback experience and prepare for basic text/audio coordination where
        practical.\n\n## Build\n- Add an audio player UI with play, pause, seek, elapsed
        time, and playback speed controls for the final audio file.\n- If the pipeline
        captures usable segment timestamps, expose lightweight hooks for syncing playback
        position to chapter or segment markers.\n- Keep the player stable across page
        updates and reloads where possible.\n\n## Deliverables\n\n- Finalize-stage
        audio player\n- Optional marker or segment sync support\n- Playback state
        handling\n\n## Acceptance checks\n\n- The user can listen to the final story
        directly in the UI.\n- Playback controls are straightforward and reliable.\n\
        - If text sync is only partial, the UI communicates that honestly.\n\n## Notes\n\
        \nBasic stable playback is more important than fancy synchronized karaoke.\n\
        \n## Suggested commit label\n\n`feat(prompt-85): audio player with text sync
        hooks`\n"
    - filename: 86-completed-session-summary-and-search.md
      content: "# 86 — Completed Session Summary and Home-Screen Search\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nImprove the session
        library so finished stories are easy to find and revisit later.\n\n## Build\n\
        - Enhance the home screen with searching, filtering, or grouping for sessions
        by status, genre, date, or title.\n- Add richer summary metadata for completed
        sessions such as final title, total runtime, and artifact readiness.\n- Make
        it easy to distinguish a draft session from a polished completed story.\n\n\
        ## Deliverables\n\n- Enhanced session library UI\n- Backend query support
        for filters/search\n- Completed-session summary metadata\n\n## Acceptance
        checks\n\n- The library scales beyond a handful of sessions.\n- Completed
        stories feel like durable artifacts worth returning to.\n- Search and filters
        behave predictably.\n\n## Notes\n\nKeep the experience tidy, not dashboard-heavy.\n\
        \n## Suggested commit label\n\n`feat(prompt-86): completed session summary
        and search`\n"
    - filename: 87-developer-debug-inspector.md
      content: "# 87 — Developer Debug Inspector\n\nRead `base_prompt.md` first and
        preserve all prior prompt work.\n\n## Objective\n\nAdd a hidden or developer-only
        inspector for session internals so it is easier to debug long AI-driven workflows.\n\
        \n## Build\n- Create a developer surface that can show current session snapshot,
        plan revision, active jobs, recent events, and current artifact inventory.\n\
        - Gate it behind a development flag or route not intended for end users.\n\
        - Use it to make troubleshooting easier during future prompts.\n\n## Deliverables\n\
        \n- Developer debug inspector\n- Config flag for enabling it\n- A short note
        explaining how to use it\n\n## Acceptance checks\n\n- Developers can inspect
        what the system thinks is true without manually querying the database.\n-
        The inspector stays out of the main user experience.\n- It helps explain failures
        in composition or audio generation.\n\n## Notes\n\nThis is for trust during
        development, not for product polish.\n\n## Suggested commit label\n\n`feat(prompt-87):
        developer debug inspector`\n"
    - filename: 88-artifact-retention-and-cleanup.md
      content: "# 88 — Artifact Retention and Cleanup Policies\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nPrevent storage
        sprawl by defining what partial outputs should be kept, superseded, or cleaned
        up over time.\n\n## Build\n- Write retention rules for temporary composition
        checkpoints, superseded rewrites, old audio segments, preview files, and final
        exports.\n- Implement lightweight cleanup hooks or maintenance commands for
        obvious expired temporary artifacts.\n- Make sure cleanup never deletes the
        currently active canonical outputs for a session.\n\n## Deliverables\n\n-
        Retention policy document\n- Cleanup commands or maintenance job stubs\n-
        Safety checks for canonical artifacts\n\n## Acceptance checks\n\n- Temporary
        artifacts have a lifecycle instead of growing forever.\n- Final user-facing
        artifacts are preserved safely.\n- Cleanup can be run without fear of deleting
        the active session output accidentally.\n\n## Notes\n\nStart conservative.
        Deleting too little is better than deleting too much.\n\n## Suggested commit
        label\n\n`feat(prompt-88): artifact retention and cleanup`\n"
    - filename: 89-full-journey-e2e-test.md
      content: "# 89 — Full Journey End-to-End Test\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nAdd a comprehensive
        test that walks through the entire product from starting a session to downloading
        finished artifacts.\n\n## Build\n- Cover the full user journey: create session,
        pick genre/tone, enter brief, choose/refine pitch, choose/refine character
        sheet, review beat sheet, set story length, compose, configure audio, generate
        outputs, and finalize.\n- Mock model-heavy operations where necessary but
        keep database, storage, job state, and UI navigation realistic.\n- Assert
        that the final session has readable text, a docx asset, and an audio asset.\n\
        \n## Deliverables\n\n- Full journey test\n- Supporting fixtures and mocks\n\
        - Short note on current blind spots\n\n## Acceptance checks\n\n- The product
        can be exercised as one coherent system in automated form.\n- The test proves
        artifact generation and session resumability assumptions.\n- The biggest user-facing
        regressions would be caught.\n\n## Notes\n\nThis is the confidence test for
        the whole app.\n\n## Suggested commit label\n\n`feat(prompt-89): full journey
        e2e test`\n"
    - filename: 90-local-identity-and-future-auth-shape.md
      content: "# 90 — Local Identity Model and Future Authentication Shape\n\nRead
        `base_prompt.md` first and preserve all prior prompt work.\n\n## Objective\n\
        \nDecide how the app identifies a user in local development and leave a clean
        seam for real authentication later.\n\n## Build\n- Implement a simple local
        single-user mode or lightweight identity stub so sessions can be associated
        with an owner without adding full auth complexity yet.\n- Keep session ownership
        and route assumptions compatible with a future multi-user setup.\n- Document
        the current auth stance plainly in the README and architecture notes.\n\n\
        ## Deliverables\n\n- Local identity stub or single-user assumption in code\n\
        - Ownership field wiring where needed\n- Docs for current and future auth
        assumptions\n\n## Acceptance checks\n\n- The app works cleanly in local development
        without a full sign-in system.\n- The data model does not paint future auth
        into a corner.\n- Ownership assumptions are explicit.\n\n## Notes\n\nDo not
        overbuild auth for v1.\n\n## Suggested commit label\n\n`feat(prompt-90): local
        identity and future auth shape`\n"
    - filename: 91-rate-limits-retries-and-fallbacks.md
      content: "# 91 — Rate Limits, Retries, and Model Failure Handling\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nHarden the app
        against transient Gemini failures, quota issues, and worker retries so long
        workflows do not fail messily.\n\n## Build\n- Add retry and backoff behavior
        where it is safe for planning, composition, and audio generation calls.\n\
        - Distinguish retryable failures from user-actionable failures such as invalid
        settings or exhausted quotas.\n- Expose clear job status and chat or UI messages
        when the system is waiting, retrying, or needs user intervention.\n\n## Deliverables\n\
        \n- Retry policy implementation\n- Failure classification rules\n- User-visible
        status messaging for degraded states\n\n## Acceptance checks\n\n- Transient
        provider issues do not instantly poison the whole session.\n- The user can
        tell whether the system is retrying or actually stuck.\n- Retries are bounded
        and observable.\n\n## Notes\n\nBe explicit about retry limits and side effects.\n\
        \n## Suggested commit label\n\n`feat(prompt-91): rate limits retries and fallbacks`\n"
    - filename: 92-observability-and-logging.md
      content: "# 92 — Observability, Logging, and Traceability\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nMake it practical
        to understand what happened inside the app across API requests, worker jobs,
        model calls, and artifact generation.\n\n## Build\n- Add structured logging
        with request IDs or session IDs flowing through API, worker, and model-service
        layers.\n- Log important lifecycle events for composition and audio jobs without
        dumping excessive private content.\n- Document how to inspect logs during
        local development and CI failures.\n\n## Deliverables\n\n- Structured logging
        setup\n- Correlated identifiers across services\n- Developer observability
        notes\n\n## Acceptance checks\n\n- A developer can trace a failing session
        through logs.\n- Logs are useful for debugging but avoid gratuitous raw content
        exposure.\n- The worker and API logs can be correlated.\n\n## Notes\n\nGood
        logging will save you repeatedly.\n\n## Suggested commit label\n\n`feat(prompt-92):
        observability and logging`\n"
    - filename: 93-accessibility-pass-and-keyboard-support.md
      content: "# 93 — Accessibility Pass and Keyboard Support\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nPolish accessibility
        across the main workflow so the product remains usable under real conditions.\n\
        \n## Build\n- Audit the home screen, workspace, chat, selection cards, composition
        view, progress indicators, and finalize screen for keyboard support and semantic
        structure.\n- Fix obvious tab-order, focus, aria-label, and live-region issues,
        especially around chat messages and progress updates.\n- Add reduced-motion
        handling for live composition and progress animations.\n\n## Deliverables\n\
        \n- Accessibility fixes across the app\n- Any helper hooks or components needed
        for a11y\n- A checklist of what was covered\n\n## Acceptance checks\n\n- Core
        product flows are navigable without a mouse.\n- Dynamic updates are announced
        or represented accessibly where reasonable.\n- Reduced-motion users are not
        punished by the live-writing UI.\n\n## Notes\n\nFocus on the real workflow,
        not a theoretical score.\n\n## Suggested commit label\n\n`feat(prompt-93):
        accessibility pass and keyboard support`\n"
    - filename: 94-performance-pass.md
      content: "# 94 — Performance Pass for Long Sessions\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nKeep the app
        responsive when a session accumulates lots of chat messages, revisions, segments,
        and artifacts.\n\n## Build\n- Profile or inspect the heaviest frontend and
        backend paths that will grow over long sessions.\n- Optimize obvious hotspots
        such as large chat renders, session hydration payload size, and repeated expensive
        recomputations.\n- Document any pagination, virtualization, or lazy-loading
        choices for long histories.\n\n## Deliverables\n\n- Performance fixes or guard
        rails\n- Notes on long-session scaling decisions\n- Any virtualization or
        pagination introduced\n\n## Acceptance checks\n\n- Longer sessions remain
        practical to open and use.\n- Hydration payloads and UI rendering do not grow
        uncontrollably.\n- The performance choices are documented so future work does
        not undo them.\n\n## Notes\n\nTackle real hotspots, not imagined ones.\n\n\
        ## Suggested commit label\n\n`feat(prompt-94): performance pass`\n"
    - filename: 95-ci-pipeline.md
      content: "# 95 — Continuous Integration Pipeline\n\nRead `base_prompt.md` first
        and preserve all prior prompt work.\n\n## Objective\n\nAutomate linting, tests,
        and build validation so regressions are caught before they land.\n\n## Build\n\
        - Add a CI workflow that runs frontend and backend linting, unit tests, integration
        tests where practical, and at least one build step.\n- Cache dependencies
        sensibly to keep CI time reasonable.\n- Fail clearly with useful logs when
        migrations, tests, or builds break.\n\n## Deliverables\n\n- CI workflow config\n\
        - Documented required checks\n- A short troubleshooting note for common CI
        failures\n\n## Acceptance checks\n\n- The repo has a repeatable automated
        validation path.\n- Both frontend and backend are included in CI, not just
        one stack.\n- CI feedback is specific enough to help fix failures quickly.\n\
        \n## Notes\n\nKeep the first CI pass dependable rather than exhaustive.\n\n\
        ## Suggested commit label\n\n`feat(prompt-95): ci pipeline`\n"
    - filename: 96-compose-dev-and-prod-shapes.md
      content: "# 96 — Development and Production Compose Shapes\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nRefine containerization
        so local development remains smooth and future deployment paths are not an
        afterthought.\n\n## Build\n- Review the Dockerfiles and compose setup for
        the frontend, API, worker, Postgres, and GCS emulator.\n- Split or document
        dev versus production concerns such as live reload, bind mounts, and image
        build targets.\n- Make persistence behavior for Postgres and object storage
        explicit in the docs.\n\n## Deliverables\n\n- Improved Dockerfiles and compose
        organization\n- Docs for dev versus prod assumptions\n- Persistence notes
        for local volumes\n\n## Acceptance checks\n\n- Local development remains easy
        while images still make architectural sense.\n- Persistence behavior is explicit
        and unsurprising.\n- There is a path from local compose to real deployment.\n\
        \n## Notes\n\nDo not over-engineer deployment, but leave a credible path.\n\
        \n## Suggested commit label\n\n`feat(prompt-96): compose dev and prod shapes`\n"
    - filename: 97-security-review.md
      content: "# 97 — Security Review and Secret Handling Pass\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nPerform a targeted
        security pass around secrets, downloads, storage access, and user-provided
        content.\n\n## Build\n- Review how `secrets.yaml`, environment variables,
        download endpoints, and storage paths are handled and tighten anything too
        loose.\n- Make sure the frontend never receives sensitive provider credentials.\n\
        - Review obvious injection and unsafe rendering surfaces in chat, story text,
        and generated metadata.\n\n## Deliverables\n\n- Security review notes\n- Any
        code fixes for secret handling or unsafe rendering\n- Updated docs where needed\n\
        \n## Acceptance checks\n\n- The project’s secret-handling story is clear and
        reasonably safe for local development.\n- Artifact access stays mediated through
        the backend.\n- User and model text is rendered safely.\n\n## Notes\n\nAim
        for practical hardening, not ceremony.\n\n## Suggested commit label\n\n`feat(prompt-97):
        security review`\n"
    - filename: 98-demo-data-and-onboarding.md
      content: "# 98 — Demo Data and First-Run Onboarding\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nMake the app
        easier to explore by providing seeded demo sessions or an onboarding hint
        flow for new developers and first-time users.\n\n## Build\n- Create optional
        demo data that shows at least one in-progress session and one completed session
        with representative metadata.\n- Add a light onboarding empty state on the
        home screen that explains the workflow in plain language.\n- Document how
        to load or reset the demo data during development.\n\n## Deliverables\n\n\
        - Demo data seed or fixture flow\n- Improved first-run empty state\n- Docs
        for loading demo content\n\n## Acceptance checks\n\n- A fresh developer can
        see what the product is supposed to feel like quickly.\n- The home screen
        is informative even when no sessions exist.\n- Demo data does not become required
        for normal operation.\n\n## Notes\n\nThis is about lowering friction.\n\n\
        ## Suggested commit label\n\n`feat(prompt-98): demo data and onboarding`\n"
    - filename: 99-release-checklist-and-future-roadmap.md
      content: "# 99 — Release Checklist and Next-Step Roadmap\n\nRead `base_prompt.md`
        first and preserve all prior prompt work.\n\n## Objective\n\nClose the build
        sequence by documenting what a release-ready version requires and what future
        improvements should come next.\n\n## Build\n- Write a release checklist covering
        environment setup, migrations, seed data, quality gates, persistence checks,
        and artifact generation sanity checks.\n- Summarize the major open gaps or
        obvious future enhancements such as richer voice libraries, age presets, collaborative
        sessions, or visual storyboards.\n- Update the root README so the repo now
        reads like a complete buildable product rather than a scaffold.\n\n## Deliverables\n\
        \n- Release checklist document\n- Future roadmap note\n- Final README polish\n\
        \n## Acceptance checks\n\n- A maintainer can tell what ‘done enough to ship
        a first version’ means.\n- The future roadmap grows naturally from the built
        system.\n- The documentation feels complete and coherent.\n\n## Notes\n\n\
        End with clarity, not hype.\n\n## Suggested commit label\n\n`feat(prompt-99):
        release checklist and future roadmap`\n"
