# Default yolopilot settings copied into each project's .yolopilot/config.yaml.
version: 0.0
model: gpt-5.4
reasoning_effort: xhigh
# The initial project config replaces this with the working directory name unless --conda is provided.
conda: yolopilot
codex_command: npx -y @openai/codex
sandbox: danger-full-access
max_retries: 5
initial_retry_delay_seconds: 10
input_cost_per_1m:
cached_input_cost_per_1m:
output_cost_per_1m:
